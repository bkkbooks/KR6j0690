body:
  text: 天台山幽溪沙門傳燈述第六因究竟者四教因位各各不同若三藏一往約菩薩論始從停心終至三十四心通教從初乾慧至於九地別教始從十信終至等覺圓教始從五品乾慧終至等覺辨此為三一始終改不改二因果異不異三因心作不作初始終改不改者若藏通始終唯一空觀無復可論改與不改若別教菩薩三觀俱修先空次假後中是則始終節節須改唯今圓人初心即修首楞大定以此大定為歷位之本豈唯因心不改至於果地亦秪證此大定而已故經總結五十五位云是種種地皆以金剛觀察如幻十種深喻奢摩他中用諸如來毗婆舍那清淨修證漸次深入次因果異不異者果無生三德之果也藏通之果灰身滅智果尚生滅因豈無生若別教登地證與圓同妙覺位中生滅之心雖猶未盡然皆稱理分證亦得果名無生若因心空假既不即中是故修之與成無非生滅此則因生滅而果無生也今之圓人既聞生滅去來本如來藏常住妙明不動周圓妙真如性是則發軫便須以無生之智修此大定故經明二種決定中云汝等若欲捐捨聲聞修菩薩乘入佛知見應當審觀因地發心與果地覺為同為異若於因地以生滅心為本修因而求不生不滅之果無有是處又云汝今欲令見聞覺知遠契如來常樂我淨應當先擇生死根本依不生滅圓湛性成以湛旋其虗妄滅生復還元覺得元明覺無性滅性為因地心然後圓成果地修證云云此即天台所謂全性起修全修在性因果始終無非常住者也三因心作不作者前之三教不知生死煩惱即涅槃菩提是故所有業惑定須翻破故其因心皆成有作今之圓人知陰入處界本如來藏陰入處界何須翻破如來藏性亦無煩別顯故初心行者直下體此圓理以修大定至於果成而見思塵沙無明任運銷落如來藏三諦之理法爾證得故乾慧地中即云執心虗明純是智慧二信即云陰入界三不能為礙何況住行向地等位耶是名因究竟第七果究竟者果地有二種德所謂智斷智德名菩提斷德名涅槃總云菩提別則有三謂一切智道種智一切種智也總云涅槃別亦有三謂圓淨涅槃方便淨涅槃性淨涅槃也此果人所證之法也約能證人則有三身約所居土則有三土謂法身居寂光土報身居實報土應身居有餘土也辨此為三一圓證不圓證二究竟不究竟三有所得無所得初圓證不圓證者藏通不聞圓名豈論圓證若別教教行二道雖不明圓至初地證道證與圓同則一證一切證三智三德三身悉能分得特以圓家之真因為別家之極果與圓為異耳若今圓人則教行證道無不俱圓故名字圓聞觀行圓修至於分真究竟則一證一切證三種智斷及以三身一時頓得故今初住位云心精發輝十用涉入乃至十身靈相一時具足自非圓證莫能銷釋此語矣第二究竟不究竟者藏教果佛發真無漏三十四心斷見思習氣證一切智坐木菩提樹下生草為座成劣應身佛居方便有餘淨土薪盡火滅入方便淨涅槃通教果佛以一念相應慧頓斷見思殘習證一切智坐七寶菩提樹下以天衣為座成劣勝應佛居方便有餘淨土薪盡火滅入方便淨涅槃別教破十二品無明證一切種智入妙覺位即圓教二行坐蓮華藏世界七寶菩提樹下大寶華王座成圓滿報身居實報無障礙土入圓淨涅槃此三教果佛地位雖殊要之悉未究竟唯今圓佛破盡四十二品無明入妙覺位諸法不生般若不生不生不生名大涅槃以虗空為座成清淨法身居常寂光土故經云如是重重單復十二方盡妙覺成無上道又云入妙莊嚴海圓滿菩提第三有所得無所得者前之三教由不聞生死煩惱即是菩提涅槃必須去生死煩惱之故證涅槃菩提之新故至果地似有所得今經圓人既知生死煩惱即是涅槃菩提則生死煩惱之故故則非故涅槃菩提之新新則非新故若非故雖在生死煩惱又何所失故云陰入處界本如來藏新若非新雖證涅槃菩提又何所得故云圓滿菩提歸無所得是名果究竟第八教究竟者教為能詮既無別有體相是則前之所辨七種究竟而教究竟在其中矣但別相雖彰總相未了故亦立三意以辨明之一七法整足不整足二七法俱圓不俱圓三教道可廢不可廢初義者此七種義遍布如來一代大小偏圓教中於諸經內或有整足不整足者今經七義如向所引最為整足次俱圓不俱圓者或七種俱圓此是圓教七種偏小此是前教或前偏後圓此是別教或圓接通別或前後俱圓中間帶一二種偏名此是圓教借名之意如今經當機證初果三果地位之中借通教初乾慧地及借藏教四加行位雖是偏名義無不圓三可廢不可廢者前三教所詮七種既非究竟故或被方等彈呵而廢或被般若淘汰而廢此二時若廢而不轉必待法華開顯而廢若不預法華三周廢者又須涅槃捃拾而廢如退席聲聞是也又前二時但能廢人不能廢教或有廢者以機未熟尋又建立必待法華畢竟而廢若此經純圓在方等般若則為諸佛菩薩之所褒歎何況能廢縱令法華亦不能廢故法華云是諸人等聞我所說已入佛慧等云云蓋於四時之中求為法華網目之圓融整足無愈楞嚴矣是名教究竟約八法行布釋首楞嚴竟次約諸字圓融釋者前明八法既皆究竟則因超果海果徹因源理智行位重重互入故法身報身應身如來之大多勝也奢摩他三摩禪那密因之大多勝也入於如來妙莊嚴海圓滿菩提歸無所得修證之大多勝也以三菩提上求佛道三慈悲下化衆生諸菩薩之大多勝也有三摩提名大佛頂首楞嚴王具足萬行萬行之大多勝也法身本覺二德始覺始本不二大佛頂之如來也中道屬性空假屬修修性不二密因之如來也修惡即性善惡不二六種位次無不即理修證之如來也發心究竟二不別諸菩薩之如來也緣即了正了正即緣萬行之如來也三德祕藏如天主三目大佛頂之密因也法報應三如世伊三點如來之密因也煩惱即菩提菩提即煩惱六不妨即即不妨六修證之密因也大乘因者諸法實相諸菩薩之密因也有三摩提具足萬行萬行之密因也正因屬性緣了屬修全性起修全修在性大佛頂之修證也如者本覺來者始覺如來之修證也三止三德體一名異修者修此證者證此密因之修證也性具諸法離性無人諸菩薩之修證也本有名具此屬於理該攝積聚此屬於事萬行之修證也微妙三德遍在十界大佛頂之菩薩也諸佛果地融通全證衆生理本如來之菩薩也方便隨緣止止於俗諦蜜因之菩薩也不滅不生合如來藏惟妙覺明圓照法界修證之菩薩也本有為具性具十界萬行之菩薩也三種具足即是三德大佛頂之萬行也復有一行是如來行雖是一行而具五行如來之萬行也有三摩提具足萬行蜜因之萬行也住前圓修登住圓證修證之萬行也普賢願海萬行莊嚴諸菩薩之萬行也楞嚴教旨微妙如斯了義之說莫此加矣故曰大佛頂如來密因修證了義諸菩薩萬行首楞嚴釋別名竟次釋通名者經之一字也梵云修多羅舊云有翻無翻歷貫線等五一一約教行理成十五義委如妙玄今但略釋為二一約通別以明教體二約相代以訓經義初義者神寶記云夫經者聖人所以示教也因教以悟道則有通有別通謂十方佛土該於六塵皆為教體故淨名云以一食施於一切於食等者於法亦等於法等者於食亦等此則偏用舌根所對為經或有國土以天衣觸身即能得道此偏用觸塵為經或見佛光明得道此偏用色為經或寂然無言觀心得道此偏用意為經如衆香土以香為佛事此偏用香為經蓋由他方根識峻利故得通以六塵為經又若推而廣之彼一一塵皆具六根而一一根皆具六塵遍法界中根根塵塵皆可入道無適非經縱使教外別傳心要至於無說無字但有一法當情及無當情者是亦教體何處何法為別傳耶自非深見此理難以筆舌既也次別者他方六根識利六塵可得為經此方三根識利唯以色聲及法塵為經以聲為經者妙玄云如佛在世金口演說但有音聲詮辨聽者得道故以聲為經大品云從善知識所聞也用色為經者若佛在世可以聲為經今佛去世紙墨傳持應用色為經大品云從經典中聞也用法為經者內心思惟心與法合不由他教亦非紙墨但心曉悟即法為經故云修我法者證乃自知此三塵為經施於此土也私謂次以色為經唯在滅後可爾若初聲為經不局佛世如今時自有不識文字亦因聲得悟然能說者終從色法紙墨中得故大師偏約佛世說也第三用法為經則佛世滅後皆可論之又此通別蓋是因明教體故作此說若行理皆名為經則此土根塵識三亦遍可為經如二十五聖從十八界悟入此行經遍也普賢觀經云毗盧遮那遍一切處一切諸法無非佛法法華經藏深固幽遠無人能到此理經遍也故知若約行理而論根根塵塵遍法界中皆可為經次約相代以訓經義者古以修多羅翻為經者開善云非正翻也但以此代彼耳此方聖說為經賢說子史彼聖稱經菩薩稱論既不可翻宜以此代彼故稱經也既以此代彼此方經義訓法訓常法乃萬代軌則常則百王不易佛經亦然天魔外道不能沮壞是為教常真正無雜無能逾過是為行常湛然不動決無異趣是為理常此方真教體清淨在音聞是名教軌十方薄伽梵一路涅槃門是名行軌覺海性澄圓圓澄覺元妙是名理軌釋名竟大章第二辨體者體是主質前文解釋大佛頂等二十來字皆能詮名今辨此名所詮之體欲令學者因筌得魚尋名顯體尋名意在忘名顯體知無別體此乃今家釋名辨體之妙意也大分為三初明諸經通體次出此經別名三以別合通初諸經通體者天台大師引釋論云除諸法實相餘皆魔事大乘經以實相印為經正體無量功德共莊嚴之種種衆行而歸趣之言說問答而詮辨之譬衆星之環北辰如萬流之宗東海故以實相為經體也書家解禮者訓體也體有尊卑長幼君父之體尊臣子之體賤當知體禮之釋是貴極之稱也復次體是底也窮源極底理盡淵府究暢實際乃名為底釋論云智度大海唯佛窮底故以底釋體也復次體是達義得此體意通達無壅如風行空中一切無障礙一切異名別說皆與實相不相違背釋論云般若是一法佛說種種名故以體達釋經體也次出此經別名者諸大乘經雖通以實相而為正體然實相體通遍受衆號故釋論云般若是一法佛說種種名若能以實相而定諸名則名無不圓義無不實故四明云毗盧遮那遍一切處一切諸法無非佛法是則世出世間二死五住至荔多蠢動蜎飛五無間等若因若果無非圓極第一義諦故此諸名皆實不虗五住二死等尚是實相異名況實際等諸名非實相乎故天台釋諸大乘經體有時亦就別名而辨如觀音玄以靈智合法身為體光明玄以法性為體等然則今經之體於此通別兩楹必何所歸古之宗台教而解釋此經者不下十餘家於立五重玄義之所及見者唯孤山圓師之經疏吳興嶽師之說題孤山則以常住真心為體吳興則以空如來藏為體雖涇渭分清蘭蕙競秀然於中間所得偏正亦或不無容議如孤山以常住真心為體謂此經正宗之首佛告阿難當知一切衆生生死相續皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉然依此而立是得經之正體者也但不應云經文顯云常住真心性淨明體安得不以此為體今謂若顯言其體而便立為體者且經中處處言體如首卷云無始菩提涅槃元清淨體二卷云元是菩提妙淨明體又云其性真為妙覺明體此皆經文顯言其體何獨捨彼而取此乎吳興以空如來藏為體者謂如來藏是經之盛談故也若以經之盛談宜立為體者一經始末無非常體常宗之詮表是則常住真心其談尤盛烏得晦其義而獨取於言乎須知常住真心即空如來藏也經云空如來藏等七種稱謂雖別清淨圓滿體性堅凝如金剛王常住不壞此其是矣是知若以常心為體名義俱正常住體遍無所不攝今還雙收二家正以常住真心為體旁取如來藏文釋義以常住真心為體則有多意一是經之首領如經初發軫即云一切衆生不知常住真心性淨明體故二是經之盛談如屈指飛光驗見不動觀河之見童𮫃不遷訖第四卷皆明常住真心故三以智驗諦蓋體是如來妙智究盡之法既云我以妙明不滅不生合如來藏能究盡者既是常住所究盡者安得不常四以宗驗體蓋體是宗之所歸宗常體亦宜常經云若於因地以生滅心為本修因而求不生不滅之果無有是處因果之宗既須常住所歸之體安得不常又當機發行之由具圓通常三義彌須以常住真心為體矣言通取如來藏文釋義者蓋常住真心是一切法之總體離常心無諸法可論離諸法亦無常心可論故經云如來常說諸法唯心所現一切因果世界微塵因心成體又云我常說言色心諸緣及心所使諸所緣法唯心所現汝身汝心皆是妙明真精妙心中所現物云何汝等遺失本妙圓妙明心寶明妙性認悟中迷又云此見及緣皆是菩提妙淨明體云云良由實相真心具足諸法諸法法爾性本無生故如來藏文中廣約陰入處界以明常住妙明不動周圓之義苟非具足諸法性本無生難以銷會此語然彼四科文雖浩汗義猶總略惟七大之文則備明常住真心的義所謂性色真空性空真色清淨本然周遍法界是也蓋竪窮三世不生不滅之謂常橫亘十虗無去無來之謂住體性清淨不受妄染之謂真今言清淨本然周遍法界夫清淨即體性清淨不受妄染也本然即竪窮三世不生不滅也周遍法界即橫亘十虗無去無來也一大既然餘大亦爾以後驗前即何之四科所謂常住妙明等亦從而可知矣問七大之文前四乃對空而辨曰性色真空性空真色等第五空大乃對覺而辨曰性覺真空性空真覺第六見大乃對覺明而辨曰性見覺明覺精明見第七識大又乃對明知而辨曰性識明知覺明真識如此對辨不同其說何也答此由衆生無始迷真覺以為根識局內身以遺外境對空色以分大小如經所謂晦昧為空空晦暗中結暗為色色雜妄想想相為身聚緣內搖趣外奔逸昏擾擾相以為心性一迷為心決定惑為色身之內不知色身外洎山河虗空大地咸是妙明真心中物譬如百千澄清大海棄之惟認一浮漚體目為全潮窮盡瀛渤如來憐愍斯輩將為指迷而即悟故必自淺以之深先以無邊之虗空對辨有邊之四大故往復言之而曰性色真空性空真色乃至性風真空性空真風所以然者地大之色堅質而有方所者也虗空融通故無方所矣水火風大搖動而有生滅者也虗空恆然故無搖動矣凡有生滅去來則有虗妄無生滅去來故性真圓融矣今曰性色真空性空真色猶言空性色亦性空真色亦真色之與空本無差別故於第五空大文中而和會云若此虗空性圓周遍本不動搖當知現前地水火風均名五大性真圓融皆如來藏本無生滅阿難汝心昏迷不悟四大元如來藏當觀虗空為出為入為非出入是則四大與空均一常住相雖似異性乃元同莫不清淨本然周遍法界稱之為大不亦宜乎復次色空之常遍雖融身境之無差未會故又於空大文中而云性真覺空性空真覺所言覺者通而言之即根與識也所以空覺相對而辨者夫根識有覺知者也虗空無覺知者也事固如是理實不然故往復言之而曰性覺真空性空真覺猶言覺性空亦性覺真空亦真空之與覺元無殊異故於見大文中而和會云若見聞知性圓周遍本不動搖當知無邊虗空并其動搖地水火風均名六大性真圓融皆如來藏本無生滅斯則以根識均虗空豈唯虗空非無情而地水火風亦非無情以虗空均根識豈唯虗空常遍而根識亦常遍也稱之為大不亦宜乎復次內外既會身境圓融然於真妄兩途情執猶云冠履故又於見識兩大文中而云性見覺明覺精明見性識明知覺明真識性見明見清淨六根也覺明覺精衆生六受用根也性識真識八識九識也明知覺明六識七識也此皆全體起用全用在體故往復言之若此所以古德云約諸識門雖一多不定皆是體用緣起本末相收從本向末寂而常用從末向本用而常寂寂而常用故靜而不結用而常寂故動而不亂靜而不結故真如是緣起動而不亂故緣起是真如真如是緣起故無涅槃不生死即八九為六七緣起是真如故無生死不涅槃即六七為八九無涅槃不生死故法界皆生死無生死不涅槃故法界皆涅槃云云識既如是根亦復然豈唯六根即向之五大莫不體用相即以三界唯心一切惟識故故於識大文中而和會云若此識心本無所從當知了別見聞覺知圓滿湛然性非從所兼彼虗空地水火風均名七大性真圓融皆如來藏本無生滅夫諸法真常圓會若此稱之為大不亦宜乎是以聖言至此詮理既極當機氷執情亦泮然故經敘阿難及諸大衆蒙佛如來微妙開示身心蕩然得無罣礙是諸大衆各各自知心遍十方見十方空如觀手中所持葉物一切世間諸所有物皆即菩提妙明元心心精遍圓含裹十方反觀父母所生之身猶彼十方虗空中吹一微塵若存若亡如湛巨海流一浮漚起滅無從了然自知獲本妙心常住不滅文觀斯妙悟驗前圓詮豈唯見藏性會通之玄抑以知經體性具之妙由數來所宣惟明藏性欲委常住尚須義求今此敘悟乃云一切世間諸所有物皆即菩提妙明元心洎乎結文又云獲本妙心常住不滅豈非為其常住真心性具諸法即此諸法性本無生而謂之常住真心性淨明體乎是故今經之體其義遍圓前曰雙收二家義又見乎此也問常住真心理固若是即事而驗可得示乎答根塵識三理雖常住即事而驗難可畢指良由衆生循業既久情器確分即鼻舌諸根尚不及牛馬矧六塵乎今擇其目前可以對𫾻即法易乎直指唯耳根及以眼根庶幾可以為似雖曰眼根明前不明後四維虧一半觀其見性洞然而於不滅不生之義猶不假乎晏居而辨似有愈於耳根者今撮其樞要而言之如經初以盲人矚暗喻見非眼之後如來將示阿難此見不生滅地乃先以客塵之義而問之言我初成道於鹿苑中為阿若多五比丘等及汝四衆言一切衆生不成菩提及阿羅漢皆由客塵煩惱所誤汝等當時因何開悟今成聖果時憍陳如起立白佛我今長老於大衆中獨得解名因悟客塵二字成果世尊譬如行客投寄旅亭或宿或食食宿事畢俶裝前途不遑安住若實主人自無攸往如是思惟不住名客住名主人以不住者名為客義又如新霽清陽升天光入隙中發明空中諸有塵相塵質搖動虗空寂然如是思惟澄寂名空搖動名塵以搖動者名為塵義佛言如是文憍陳如所言客塵乃喻煩惱生滅之法也主之與空乃喻不生滅常住真心也陳如之答既已了然即此可以親示阿難客塵主空之義是故經云即時如來於大衆中屈五輪指屈已復開開已又屈謂阿難言汝今何見阿難言我見如來百寶輪掌衆中開合佛告阿難汝見我手衆中開合為是我手有開有合為復汝見有開有合阿難言世尊寶手衆中開合我見如來手自開合非我見性有開有合佛言誰動誰靜阿難言佛手不住而我見性尚無有靜誰為無住佛言如是如來于是從輪掌中飛一寶光在阿難右即時阿難回首右盻又放一光在阿難左阿難又則回首左盻佛告阿難汝頭今日何因搖動阿難言我見如來出妙寶光來我左右故左右觀頭自搖動阿難汝盻佛光左右頭動為汝頭動為復見動世尊我頭自動而我見性尚無有止誰為搖動佛言如是文阿難所答我見如來手自開合即客義也非我見性有開有合即主義也我頭自動塵義也而我見性尚無有止誰為搖動空義也當機領解既已親切於是如來普告大衆云若復衆生以搖動者名之為塵以不住者名之為客汝觀阿難頭自搖動見無所動又汝觀我手自開合見無舒卷云何汝今以動為身以動為境從始洎終念念生滅遺失真性顛倒行事蓋曰汝觀阿難頭自搖動豈非塵乎見無所動豈非空乎如來手自開合豈非客乎阿難見無舒卷豈非主乎是則主之與空不生滅義阿難既然人固有之誠宜即此非動而體悟真常云何汝今以動為身以動為境從始洎終念念生滅遺失真性顛倒行事乎且有動之身非真身也有動之境非真境也今人者以之為身以之為境所謂性心失真認物為己輪回是中自取流轉矣此中及下文印匿王觀河之見垂手無遺悉是明見性不生滅義然下文雖以六十年觀河之見驗其不遷而於直指見性之義猶似太緩不若此間屈指飛光驗見不動乃目前對𫾻之事而常住深旨易為領略學人於此切宜自驗弗效貧人數他財寶古師云此寄粗相密談真見分別顯了並在後文此言似太容易智者勘之經文繼此辨於八還擇於諸物洞視十方非舒非縮等是明見性周遍也佛告文殊及諸大衆十方如來及大菩薩於其自住三摩地中見與見緣并所想相如虗空華本無所有此見及緣元是菩提淨妙明體云何於中有是非是等去是明見性真淨也然見性之妙常則必遍必淨但言不頓彰是故有此次第大歸自首卷盲人矚暗訖第二卷辨見性非和不和悉是明見性常住真淨之義蓋見性洞然易乎直指故也若耳根常住真淨之義則備明於第六卷文殊選圓通偈云聲有亦非生聲無亦非滅此則常真實即聞性不生滅也十方俱擊鼓十處一齊聞此則圓真實即聞性周遍也隔垣聽音響遐邇俱可聞此則通真實即聞性真淨也此皆就凡夫迷事以指悟理行人苟能即此常遍而擴充之功用轉深則德量轉勝經體之妙當不逾於見聞矣經云若能轉物即同如來身心圓明不動道場於一毛端現寶王剎遍能含受十方國土此其效也第三以別合通者諸經通以諸法實相為經正體今經別以常住真心為體名雖有別義則不殊如法華方便品長行云唯佛與佛乃能究盡諸法實相偈頌云是法住法位世間相常住世間相即諸法也常住即實相也今經始標常住真心下文乃廣明陰入處界本如來藏妙真如性此與法華世間相常義同是故雖以常住真心為體義實同乎諸法實相此之妙體橫亘十虗無去無來即天台所謂體者禮也體有尊卑君父之體尊臣子之體賤當知體禮之釋是貴極之稱也此之妙體竪窮三世不生不滅即天台所謂體是底義窮源極底理盡淵府究暢實際乃名為底也此之妙體性體清淨不受妄染即天台所謂體是達義得此體意通達無壅如風行空中一切無障礙也復次如來藏本妙圓心非心非空等體底也如來藏元明心妙即心即空等體達也如來藏妙明心元離即離非是即非即體禮也復次耳根圓通具圓通常三義圓體禮也通體達也常體底也體禮是法身德體底是般若德體達是解脫德若以三德分對五章名章總三德教相說三德體章別在法身宗章別在般若用章別在解脫今體章別在法身而明體底體達者妙宗所謂空即中故故般若德是法身底假即中故故解脫德是一切法自在之體云云大章第三明宗者妙玄云宗者修行之喉襟顯體之要蹊如梁柱持屋結網綱維提維則目動梁安則桷存蓋因果之宗是一經顯體之要故也釋此為二初簡宗體次正明宗簡宗體者妙玄云有人言宗即是體體即是宗今所不用何者宗致既是因果因果即二理體非因非果體即不二體若是二體即非體體若不二體即非宗宗若不二宗即非宗宗若是二宗即非體云何而言體即是宗宗即是體又梁柱是屋綱維屋空是梁柱所取不應以梁柱是屋空屋空是梁柱宗體若一其過如是又宗體異者則二法孤調宗非顯體之宗體非宗家之體宗非顯體之宗則邪倒無印體非宗家之體則體狹不周離法性外別有因果宗體若異其過如是今言不異而異故有宗不一而一故有體釋論云離諸法實相餘皆魔事普賢觀經云大乘因者諸法實相是大乘果者諸法實相是即其義也當知實相體通而非因果行始辨因行終論果是則諸大乘經皆以實相因果為經宗要也次正明宗者諸大乘經雖通以實相因果為經宗要但因果體通而遍應衆號如觀經疏以修心妙觀感四淨土為經宗要修心妙觀實相因也四種淨土實相果也今經云汝等若欲捐捨聲聞修菩薩乘入佛知見應當審觀因地發心與果地覺為同為異若於因地以生滅心為本修因而求佛乘不生不滅之果無有是處此義正同普賢觀經大乘因果皆是實相然通義若此別義云何昔孤山圓師嘗判此經以圓通妙定為宗蓋的取觀音耳根圓通通取一經所明定行雲間師則以楞嚴妙定為宗謂阿難始以三止為請故經之初後非談空假即說中道此為宗要今觀二師所立雖俱得其旨然皆有義無文悉非經之正意其正意者乃佛之知見也以此為宗不唯攝法周備文義亦復顯然如經初如來首告之云一切衆生生死相續皆由不知常住真心性淨明體徵心之初如來問云惟心與目今何所在當機復請云發妙明心開我道眼如來許云令諸衆生獲妙微密性淨明心得清淨眼四卷斥凡小云用世語言入佛知見阿難請入華屋云得陀羅尼入佛知見如來答云汝欲捐捨聲聞修菩薩乘入佛知見應當審觀因地發心五卷云知見立知即無明本知見無見斯即涅槃此等經文凡若干處顯言知見體用復次知見乃是略舉備必六根故經云令汝安樂妙常同是六根更非他物然根必對境對必發識是以經中前之四卷明體廣約陰入處界及以七大以明常住真心下文明宗亦各以體中一法以陳圓通故有二十五聖之多以明佛之知見故經云十方如來於十八界一一修行皆得圓滿菩提此等經義皆所以顯詮佛之知見也言攝法周備者如知見既備六根則耳根在其中矣既曰知見無見斯即涅槃此則六根通須首楞大定為本謂之佛之知見也故阿難經初有通別兩請如來下文亦有通別兩答自徵心訖自證皆所以答通請奢摩他也請入華屋訖選圓通皆所以答別請最初方便也然答別之中雖正意在別而意亦兼通如初心二決定義云汝等若欲捐捨聲聞云云此則意令依常住真心以修大定乃通義也次云汝等云云此則意令即六根降伏煩惱乃別義也又此二決定義乃應前二種根本而說彼云一者無始生死根本即第二決定也二者無始菩提涅槃元清淨體即第一決定也須知一經所詮不出二種決定如來乃先立二種根本是則一經大旨於首卷中先已舉似後之經文不過敷陳委悉二決定之義耳又二種根本決定亦是總答阿難通別兩請第一根本及第二決定答別也第二根本及第一決定答通也所以阿難必通別兩請如來必通別兩答者蓋通若無別則通無所入之門別若無通則別為事相之行如世人誰無六根由知見立知即無明本諸佛豈無六根由知見無見斯即涅槃如人有目日光明照乃能見種種色也問若以佛之知見為宗者則佛勑文殊選擇耳根又何所謂答佛所以命文殊惟選耳根者蓋入道雖有多門初心豈能遍入故令但於一門深入入一無妄彼六知根一時清淨然於所入一門又必有要苟得其要則與不圓根日劫相倍此方衆生餘根識鈍惟耳根最利故文殊順機選之以此耳根圓通為入佛知見之要門非謂圓通但只耳根而已此與摩訶止觀初心修觀必先內心故於三科揀却界入復於五陰又除前四的取識陰為所觀境如去丈就尺去尺就寸伐樹得根灸病得穴千枝百病自然銷殞大同小異所以異者彼觀第六識成圓妙三諦此觀耳根以入圓通所觀之境雖異其於所顯之理又則一也今釋此取意為二初順機對待以明耳根次順理絶待以明諸境初順機對待以明耳根者所謂此方真教體清淨在音聞欲取三摩地實於聞中入聞即耳根以耳根為所觀之境而入圓通故觀音自敘云初於聞中入流亡所然耳根為境必云何觀之而能入流亡所須知今明宗者能觀之觀也向明體者所觀之境也而觀依境發境資觀顯此中略不言入流工夫者為已備於前文故也故入流之旨其法無他但初於聞中稱性觀此耳根本理如是常住如是真淨即是入流言流者乃圓通之異稱也不入流則已若能入流即已亡所以聲處是耳處故是則凡言有聲塵之所者因循聲而流轉故也既入圓通何容有所問若體此耳根常住真淨即是入於圓通則根塵識三皆可等入又何貴於耳根答根塵識三雖皆常住秪可隨佛正教之量皈依仰信實非衆生所有智分若耳根常住真淨就衆生現量而示其理灼然故文殊偈云如觀音所說譬如人靜居十方俱擊鼓十處一齊聞此則圓真實隔垣聽音響遐邇俱可聞此則通真實聲無亦無滅聲有亦非生生滅二圓離此則常真實常真實常也圓真實住也通真實即也此數偈不唯可以驗耳根本理圓妙行者亦宜持此以資圓修如人靜居之時隨其音聲發於何方應於障外或動或靜而吾之聞性圓通常住於此彌可資而得矣經云今此娑婆國聲論得宣明又云此方真教體清淨在音聞深有意乎其言之也下言所入既寂動靜二相了然不生者所謂流既入矣則返流全一能所都亡妙淨明心迥然獨脫皆自然而然妙證一時不容前後而經方言如是漸增等者有以見語言文字不足以載道者蓋在乎此學者殆不可以次第取思議會其於此理殆庶幾焉問前云六根通以首楞大定為本而為佛之知見今云入流之旨其法無他但體此耳根常住真淨即是入流且與前釋名中奢摩他等云何會合答觀子之問似必以止而止其動必以觀而觀其昏方曰修於止觀亦必曰以空而破其有以假而破其無以中而泯其邊方曰修於三觀即世人之忽視圓頓止觀類若是也若然則纓絡初地之修三觀此經始終之修奢摩皆成有作何名聖階須知夫止觀者無妄名止不昏名觀明靜寂照定慧之異稱也如方其入流之時胸中稍有一絲情繫則彼聞性莫得其圓通且常矣烏足以為入流乎故善入流者當是時根塵逈脫獨露真常知滅對遺惺惺寂寂如偈所謂聞復翳根除塵消覺圓淨淨極光通達寂照含虗空矣何止觀而不在乎又復應知法本非空非假亦非非空假秪由法性絶待就此寓名為中秪由法性無染就此寓名為空秪由法性具足諸法就此寓名為假只一法性即絶待即無妄即具法如摩尼寶珠即瑩徹即具寶即體圓雖三宛然而是一珠雖是一珠而三宛然耳根圓通亦復如是十方俱繫鼓十處一齊聞就此絶待說名為中能觀此圓是觀中道故經云空覺極圓空所空滅隔垣聽音響遐邇俱可聞就此無礙說名為空能觀此通是觀真空故經云盡聞不住覺所覺空聲無亦非滅聲有亦非生就此無生說名為有能觀此常是觀妙有故經云動靜二相了然不生天台云全由性具實匪修成不其然乎此猶約不次中說於次第若不次不次說者舉圓必通必常舉通必圓必常舉常必圓必通是故返聞之時但觀其圓則通之與常皆在是矣故觀音云我從耳門圓照三昧緣心自在因入流相得三摩地又云我由觀聽十方圓明故觀音名遍十方界此乃稱性而觀絶待而照天台云圓人始終皆以中觀為體此經初信云即以此心中中流入如來彰自證云我以不滅不生合如來藏而如來藏惟妙覺明圓照法界二决定云依不生滅圓湛性成以湛旋其虗妄滅生皆此意也此之妙觀照而常寂亦名息二邊分別止一切妄思由體此而息亦名體真止亦名空觀隨聞一切音聲達此聲處全是耳處以聞性圓故亦名方便隨緣止亦名假觀此乃即觀之止即止之觀即中道之空假即空假之中道也入流之時五住磐石砂礫一切休息名止息止心緣中道入實相慧名停止止實相之慧即非止非不上云云偈云宣說金剛王如幻不思議佛母真三昧又云聞熏聞修金剛三昧無作妙力旨歸於此問經中入流亡所古人有以法性流釋之或言聖流之流柏庭揀云然皆通而未的不當經旨以今言之此一流字正指耳根聞機所在至微至極間不容髮差之毫釐失之千里今論圓通常云秪由法性絶待說名為中何與柏庭所立頓相反耶答夫法性者有通有別通謂諸法同以一真法界為性別謂諸法各有自性然諸法是一真法界本有即通是別即別是通故無通不別無別不通是以一真法界之性圓通常諸法之性亦莫不皆圓通常他乃混以法性流釋故揀云通而不的今則的指耳根法性即圓通常正在其所取不在其所揀也問天台明法性有三種一曰性體此當正因二曰性量此當了因三曰性具此當緣因今觀耳根圓通於三性中為觀何性答夫耳根者本無明生死之法以由性具故能當體即圓通常圓通常即性體性量今則稱此而觀乃即性具觀性體性量也問若性具者必生佛互具根塵互攝在今耳根其義云何答性具之法有自有他自心生佛他心生佛只此耳根靡不畢具耳根圓通常自他生佛亦圓通常故曰陰入處界本如來藏又曰清淨本然周遍法界譬如一室千燈彼彼互具彼彼互遍故今只觀耳根而自他生佛莫不等觀故觀音妙證之時而云忽然超越世出世間上合十方諸佛同一覺心下合六道衆生同一悲仰頓獲三十二應十四無畏四不思議若不修時一念頓觀果地何能頓合生佛又若自心不具己他生佛則三十二應等皆成作意神通須知此云合者即前不生不滅合如來藏十界三諦也稱性而修名之為合背性而修名為不合覽教之者故宜會通耳根圓通竟次順理絶待以明諸境者所謂歸元性無二方便有多門聖性無不通順逆皆方便也此中絶待須明兩意一順耳根之理以論絶待次順諸境之理以論絶待初意者前之耳根既圓通常若此則當體法界攝法無餘未嘗有一法非耳根圓通所在故善入流者奚惟觀聲處即耳處味處香處根處識處乃至七大皆可入耳門圓照三昧離耳根圓通外更無他法可得故云絶待次順諸境之理以明絶待者前之絶待傍兼而已若正論者一切諸法莫非圓通故陰入處界皆云本如來藏常住妙明不動周圓妙真如性不動周圓圓也妙真如性通也常住妙明常也七大云清淨本然周遍法界周遍法界圓也清淨通也本然常也又一二卷中顯示見性周遍圓也非舒非縮通也屈指飛光驗見不動常也是故以理言之無非圓通豈獨耳根之可取餘境之可去乎但此方衆生餘根識鈍耳根最利故佛順初機勑文殊選之故諸聖亦不一槩稱理陳述蓋遵佛勑所謂汝等最初悟十八界從何方便入三摩地之意耳但衆生心病既多療治難專一藥即世人之善攝生者尚能導養得所矧學佛之知善權者乎且此經未來人亦得道應病順習豈得必拘是故逆取經宗載伸兩意一順經文二順藏理順經文則二十四門大小有殊順藏理則陰入處界一味平等何則蓋世尊既命各述最初所悟方便則諸聖宜遵佛勑隨以本時所悟而宣故經二十五門大小偏圓條然有異此義皎然固無足以開權未開而為紛紛之競矣今之所釋意存修入合順藏理以闢圓門順經文已如諸解所釋順藏理今略明之大意為二一縮法併義二正明諸門縮法併義者若二十四門逐一分釋則似文繁單明一十八界則似義闕故縮地水火風空五大以入六塵縮見大以入六根縮識大以入六識秪作三科而釋併七大如來藏性色真空等義以例三科而解文約既盡義深且明況界以大為體大與界同義故縮之併之行者苟能持此縮併文義以歷六根則雖剎剎塵塵皆斯妙觀矣又何直於二十五門而已哉次正明諸門為三初六塵次六根三六識六塵者色聲香味觸法也數雖秪六義各有三所謂違色順色非違非順之色乃至違法順法非違非順之法不可意者為違可意者為順非可意非不可意者為非違非順衆生日用目之所覩乃至意之所知不出此法由衆生盲瞑不了此法其相虗假其性乃真所以執之以為實有於是逢可意之色乃至逢可意之法即起貪愛逢不可意之色乃至逢不可意之法即起嗔恚逢非可意非不可意之色乃至逢非可意非不可意之法即瞢然無記此之三毒諸惑根本根本既立技末浩然流浪生死莫之遏絶今之行人既聞圓理逢此等境即當了達法無自性當體我心性色真空性空真色乃至性法真空性空真法清淨本然周遍法界無能無所非有非無若逢違順之境以此稱性三止而止息之則貪嗔之心預能降伏若逢非違非順之境以此稱性三觀而照了之則無記之心預得破除次六根者非取浮塵根以為根體乃取能見能聞勝義之根此之六根乃眼因明暗耳因動靜鼻因通塞舌因甘淡身因離合意因生滅吸此塵象以為見聞嗅嘗覺知之性離此諸塵畢竟無體衆生不了謂能見聞取境發識念念執著流浪生死不能斷除今之行人既聞圓理於此諸根即當了達法無自性當體我心性見覺明覺精明見乃至性知覺明覺精明知清淨本然周遍法界無能無所非有非無若因明暗生眼見時乃至生滅生意知時以此稱性三止而止息之則善惡之心不能生起若明暗等滅見亦隨滅乃至生滅滅時意亦隨滅以此稱性三觀而照了之則無記之心預得破除三六識者謂衆生日用根塵相對即有心起取境分別名之為識此之六識乃眼色為緣生於眼識乃至意法為緣生於意識離此根塵本無自體衆生不了謂為我心念念分別心心生滅致羅生死無有盡期今之行人既知圓理於此六識即當了達識無自性當體妙心性識明知覺明真識妙覺湛然周遍法界若根塵緣起生分別時以此稱性三止而停止之如此等心即得併息若根塵緣離生無記時以此稱性三觀而照了之此無記心即得破除此妙奢摩他是金剛王寶覺諸塵勞門擬之即銷行者自當取意而修不暇多云矣問耳門三昧與餘三昧相比較量勝劣有幾答耳根圓通勝妙甚多今以要求大略有二蓋圓修法門一須因果名目相應一須淺深可以長修因果相應者如經云因地發心與果地覺為同為異若於因地以生滅心為本修因而求佛乘不生不滅無有是處且經言果地覺中有七種名所謂菩提涅槃真如佛性菴摩羅識空如來藏大圓鏡智是七種名稱謂雖別莫不清淨圓滿體性堅凝如金剛王常住不壞今觀二十五聖因地發心唯觀音耳門三昧具圓通常與果地覺名目相應其餘三昧或得其一不得其二況復具三如二十四中擇其利者則眼根為上若相與比較惟屈指飛光驗見不動正與耳根擊鐘驗常相類若論圓通眼根則見性雖洞然明前不明後四維虧一半及不能觀於障外非如耳根十方俱擊鼓十處一齊聞隔垣聽音響遐邇俱可聞故眼見雖得一種常住不壞與果地名目相應既不得圓之與通則果地清淨圓滿之德又不能與之相應矣又復應知今耳根圓通十方俱擊鼓十處一齊聞即果地大圓鏡智也隔垣聽音響遐邇俱可聞即空如來藏也聲無亦非滅聲有亦非生即真如佛性菴摩羅識也淨極光通達寂照含虗空即菩提涅槃也又耳根三昧若以題中大佛會通者十方俱擊鼓十處一齊聞即大取包括法身法界遍一切處是廣大義也聲無亦非滅聲有亦非生即多取含攝報身智境照發相應不可窮盡是含攝義也隔垣聽音響遐邇俱可聞即勝取秀出應身自在無能遏絶是勝出義也乃至十種大義十種三法一一會通可知是故耳根三昧若總若別皆與果位相應次淺深長修者其餘法門或淺位可修深位不可如優波尼沙陀修不淨觀等或深位可修淺位不可如普賢心聞洞十方生於大因力等故文殊揀云自餘諸方便皆是佛威力即事捨塵勞非是長修學淺深同說法今耳根三昧具圓通常初心修此尚與極果名目相應況其餘深位乎故結位中云是種種地皆以金剛觀察如幻十種深喻奢摩他中用諸如來毗婆舍那清淨修證漸次深入普賢觀經云大乘因者諸法實相是大乘果者諸法實相是於茲見矣大章第四明用者天台云用是佛之妙能經之勝用滅惡生善為經力用滅惡故言力生善故言用滅惡故言功生善故言德此皆偏舉具論必備也舊或以破疑生信為此經力用此濫同法華孤山以返妄歸真為用以經云一人發真歸元十方虗空悉皆消殞故此說宗之力用可爾若當章明義則又不然何者以妙玄揀宗用中云宗亦有用用亦有宗宗用非用用用用非宗用用宗非宗宗宗宗非用宗宗用者因果是宗因果各有斷伏為用用有宗者慈悲為用宗斷疑生信為用用若論於宗且置斷伏但論因果今明於用但論斷疑生信且置慈悲文孤山返妄歸真正是宗中因果各有斷伏之用今章中正意不說宗用正明用用宜以破妄知見顯真知見為如來之妙能此經之勝用也破妄知見是滅惡顯真知見是生善滅惡邊際直至等覺生善邊際直至妙覺所謂生一切善滅一切惡也故經云一切衆生生死相續皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉常住真心唯佛究盡經之生善生此善也一切衆生言該九界經之滅惡滅此惡也一經之旨不出乎此故於經首提而示之以為下文張本若分文段義則初二兩卷徵心辨見破妄知見為正顯真知見為傍三四兩卷明如來藏顯真知見為正破妄知見為傍如仁王王世志在宣文國亂民離又須先武故武王繼文王而興則先之以征伐周公輔成王而治則先之以禮樂文武既濟妙得其宜經之力用亦復如是衆生心病偏執既甚藥弗瞑眩厥疾不瘳故破心極之於在內在外破見極之於在面在眼豈大聖引物入如來藏之本心哉蓋亦有所不得已而然也然於所破雖後深先淺其為所顯莫不初後俱深略如屈指飛光驗見不動示人真見直指靈源餘之旨歸多若是也問用之力用既聞命矣宗之力用可得示乎答宗中斷伏之義已如釋名斷究竟中說雖非此章正意若欲立名亦可以破妄知見顯真知見以為力用如經之後文明地位防陰魔即其事也
