body:
  text: 楞嚴玄義敘夫契經文心不易標指也唯智者大師發旋陀羅尼起遵法華具演十妙絓是教網無不炳著詳悉稱玄義云然而止觀大部全體法華十妙是知教觀殊袠理無二轍也乃大覺世尊於佛頂又揭總持所示境觀有懸契焉但是典後入真丹未經判釋時味偏圓莫知適從我百松和尚甞撰百問啟重玄之漸終慨洞庭鈞天環而聽之之無幾也參兄灯公不慮世忤作楞嚴玄義四卷豈助總持夙夜願見之意耶抑竟先師窮詰沉疑之意耶灯兄偕不慧行三昧懺法於卷荷根得入流地故于玄義三觀十乘教理行證無不究竟而委示之即靈山大蘇相與首肯不慧篇端附言亦茅屋不間庠序之謂乎然當是時多聞流亞既昧一真撥無萬行排藏心為世智值登伽為樂境觸目教觀多懷顰蹙如來說為可憐愍者即諄諄聖誥無奈之何予言獨奈之何萬歷丁酉春季沙門傳如書於西溪之九沙懺室
