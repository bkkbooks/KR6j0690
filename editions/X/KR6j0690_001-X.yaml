body:
  text: 天台山幽溪沙門傳燈述夫大佛頂首楞嚴之為法也去來惟一生滅恒如性七大而互周妙三科而等入真空真色因緣自然之四計圓離性色性空俗有真無之二偏絕寄方乎寶鑑類彼摩尼三諦之濟濟像歸十界之穰穰珍雨為眾妙之靈府為萬善之玄基寥𠔃廓𠔃不可名而強名如來藏希𠔃夷𠔃無得稱而寓稱常住心嘅眾生之性倒也昧斯一理融通局彼知見殊異或塗空而割有錯亂乎修習之門或賤邊而貴中肯綮於僧祇之劫在凡夫則計內計外在外道則執斷執常類皆以真知為妄知如迷頭而逐影以妄見為真見似棄海而認漚如來說為可憐愍者此大佛頂首楞嚴經之所以說也此經唯宣勝義獨被圓機剖常心於生滅之中指駛流為謐水會藏性於色空之內鏡額瘡為髻珠酬諸佛菩提達道陰入處界本如來藏而體之即神詰娑婆圓通本根理智根塵諸生滅法而亡之俱寂舉要言之聞思修而皆妙戒定慧以俱圓正與助而並駈顯與密而雙運歷因果始終之階級泰風送逝川之舟摧生死見愛之波旬烈𦦨銷鄰虗之雪信所謂方等實相之真詮大事因緣之先容也聲聞在昔教衍於今後五百年均一佛日爾時祇桓精舍既有妙悟阿難此國摩訶支那寧無宿根上士第為經文語活佛旨意玄解者唯緝網而祕於綱學者舉棄綱而投諸網矣故有窮年教苑研幾而莫得融通矧彼畢世禪關索隱而能之解脫者乎燈獲瞻祕誥聽學有年譬入海而算砂徒顛眩而自困既而掩卷思義置解尋經兼讀台宗乃有餘地非唯悟楞嚴為法華之要綱抑以見智者愜如來之本心談藏性則冥符性具之宗說止觀則暗合大定之旨乃至懸判地位預防陰魔一切名言靡不殫契噫玉泉慈霔幾千萬言人無證者佛隴西望數十餘載蓋有以焉今輙秉斯義海仰疏經王以佛心印佛心不亦培膏助明即楞嚴釋楞嚴孰謂以水醨乳徵文立義略擬懸談學慙疎野而詞愧不文言肆支離而義求或當勒為四卷質諸同志匪圖取捷於龍門聊託逸塵於驥尾云耳將釋此經玄義五重初釋名二辨體三明宗四論用五教相就此五章大分為二初總釋二別釋總釋又二初生起二簡別生起者光明玄義云此娑婆國土以音聲為佛事或從善知識所聞名或從經卷中聞名故名在初以聞名故次識法體體顯次行行即是宗宗成則有力力即是用用能益物益物故教他聞名是自行之始施教是化他之終有始有卒者其唯聖人乎五章生起次第如此次簡別者簡是料簡問若略則唯一若廣則無量今此五章進不是廣退不是略何故五耶答非略非廣非略故不一非廣故不多廣則令智退略則義不周我今處中說令義易明了五章中當其義如此別者分別也前一章總三法共為名次三章派三法以為別後一章兼總別而明教相也又顯體一章明理餘四章明事又前三章是因後二章是果又前四章是行後一章是教又前四章是自利行後一章是利他行又前四章是聖默然後一章是聖說法如此等種種分別料簡云云二別釋者別釋五章也先解釋名章為二初詳定經題二解釋經題初詳定者若依經中如來答文殊問名其稱有五一曰大佛頂悉怛多般怛囉無上寶印十方如來清淨海眼一曰救護親因度脫阿難及此會中性比丘尼得菩提心入徧知海一曰如來密因脩證了義一曰大方廣妙蓮華王十方佛母陀羅尼呪一曰灌頂章句諸菩薩萬行首楞嚴今譯人標題則存三隱二所謂以約該博也蓋如來立名之意必隨所詮而設一經大旨不出體宗力用今五名中初云大佛頂悉怛多般怛囉無上寶印十方如來清淨海眼此兩從體德功用而立稱也亦名救護親因度脫阿難及此會中性比丘尼得菩提心入徧知海此單從功德而立稱也亦名如來密因脩證了義此單從宗要而立稱也亦名大方廣妙蓮華王十方佛母陀羅尼呪此兩從體德宗要而立稱也亦名灌頂章句諸菩薩萬行首楞嚴此單從宗要而立稱也夫宗要者一經之主也體德者宗要之所歸也功德者宗要歸體之所自至者也功德自至雖緩而弗舉亦未為過惟體德宗要不可偏廢故今於體德舉其要而標之曰大佛頂雖三字之少已能囊括眾德矣何則蓋大佛頂者三德祕藏之異稱也如大以法身當體得名佛以般若普覆為義頂以解脫無染立稱即悉怛多般怛囉之大白傘蓋也此大佛頂楷定諸法無諸魔事即一實相之無上寶印也此大佛頂廣大圓滿軌持萬法居染不汙自在稱尊即大方廣妙蓮華王也此大佛頂遮一切惡持一切善出生十方諸佛即十方佛母陀羅尼也若灌頂章句則出此經流出之所自以密語言之亦不出乎密因二字蓋密有微密之密祕密之密故也此蓋譯人善巧撮略有方只此一十九字略舉體德備取宗要擅五名之稱謂召一經之旨歸故云大佛頂如來密因脩證了義諸菩薩萬行首楞嚴第二解釋經題又為二初通別合釋次通別各釋初義者光明玄義云夫教有通別依教明行行有通別從行顯理理有通別且置行理但明教通別者夫理無名字名字顯理如虗空無丈尺丈尺約虗空天王般若云總持無文字文字顯總持若從能顯之文字是名則通若從能顯之所以此名則別云何為通如聖所說一經一時一處一部一偈一句一言皆是文字從此文字通稱為經云何為別別則有四一令世諦不亂歡心悅耳二逗化所宜間發宿善三對其業障令惡滅罪除四點示道理霍然妙悟悅宜對悟各各所以其致不同稱之為別譬如鹽梅和合成種種滋味組織縱橫成種種文繡從別所以故有大佛頂等一十九字標今教異於諸教從通文言故有經之一字眾經通稱也今經通別合標故云大佛頂云云次通別各釋為二先釋別次釋通釋別又二先定名次解釋定名者今家釋諸經別名別相最多取要立名不出三種謂人法譬於此三中復有單三複三并具足一以成七別今於七名之中而定此經當複三中人法為名也於人法中各有因果大佛頂果法也如來果人也密因萬行因法也諸菩薩因人也脩證了義首楞嚴則該因該果此經因果人法合標故云大佛頂云云次解釋為二初解大佛頂等十六字次解首楞巖初中大佛頂如來密因脩證者夫密有微密之密祕密之密今此密因義該二種一是當機所請妙奢摩他三摩禪那舉一即三言三即一故稱為妙妙即密也以此為因故稱密因一是如來所宣神呪諸佛密言人莫能測故稱為密令行人持此以登聖果故稱密因然顯密之行雖殊而所依之理同如來藏又必顯密雙脩方能證入果位故以一名而召兩行矣謂之如來密因者在顯言之所謂此奢摩他等是十方如來得成菩提者也在密言之所謂此悉怛多般怛囉十方如來因此持此得成正覺者也謂之大佛頂如來者此指宣說神呪之化佛也是世尊頂放百寶無畏光明之所化者故曰大佛頂如來佛稱為大者梵云摩訶也古人或云不可翻以含大多勝三義故故釋論云梵云摩訶謂大多勝為此方文字義無兼含故不可翻今題中單翻大者由此方大字字雖不含義實該博如老子云域中有四大而王處一焉所謂道大天大地大王亦大然王者人耳而所以與天地北大者誠由道致中和得其勝位天地位而萬物育也致中和而天地位此同天地為大也萬物均育此以多為大也又得其勝位此以勝為大也又如世人稱父母長上為大人此亦勝為大也沙門稱多眾為大眾此亦多為大也是則此方大字義亦多含雖以單翻理無所失今先約梵音兼含以釋大佛次約明言當體以釋大佛初兼含釋者釋論云摩訶含大多勝者大取包廣多取含攝勝取秀出章安云法身法界遍一切處是廣大義報身智境照發相應不可窮盡是含攝義應身自在無能遏絕是勝出義是則法報應三俱稱大佛今若唯約應佛之勝而釋此藏通之大佛也唯約報身之多而釋此別教之大佛也唯約法身之大而釋此圓教之大佛也此所說經既是圓經能說教主合是圓佛雖是圓佛據現跡觀乃屬應身但此應身其來有本其本者何所謂法報是全此法報所垂之應只應身即是法報故華嚴云清淨妙法身湛然應一切天台云水銀和真金能塗諸色像功德和法身處處應現往故知未甞有法報而不垂應身亦未甞有應身而不即法報但隨機見不同或勝劣之差降耳今經當機乃用業識而見則佛依中理而應依中而現豈不即法即報者耶故經述偈讚云妙湛總持不動尊妙湛讚真諦即報身也總持讚俗諦即應身也不動讚中道即法身也蓋由當機妙悟洞見法源故形言於口稱性而讚今題目是總豈不以總而貫於別是故此之大佛須約三義而釋即法大報多應勝也言法大者所謂大取包廣法身法界遍一切處是廣大義普賢觀經云毗盧遮那遍一切處此經云空生大覺中如海一漚發即法身廣大義也報多者所謂多取含攝報身智境照發相應不可窮盡是含攝義經云我以不滅不生合如來藏而如來藏唯妙覺明圓照法界是故於中一為無量無量為一小中現大大中現小乃至非心非空等即報身不可窮盡義也應勝者所謂勝取秀出應身自在無能遏絕是勝出義經云不動道場遍十方界身含十方無盡虗空於一毛端現寶王剎坐微塵裏轉大法輪即應身自在無能遏絕義也此以三字對釋三身如此若以三字共釋一身者則法身不唯大亦多亦勝報身不唯多亦勝亦大應身不唯勝亦多亦大法身三者大義如前法多者法身具足諸法非如大虗逈無一物故觀經云毗盧遮那徧一切處一切諸法無非佛法此經云陰入處界本如來藏性色真空等清淨本然周徧法界即法身含攝多義也法勝者此之法身如彼圓伊當上一點最尊無上為報應二脩所歸故天台云如眾星之環北辰萬流之宗東海即法身秀出勝義也報身三者報智既與法性相應相冥法身遍一切處報身亦遍一切處故般若云佛說非身是名大身即報身廣博義也報多準前又報智以法門為身所謂第一義為髻八萬陀羅尼為髮無漏為鼻等云云亦報身含攝多義也報勝者前之法身雖名為勝乃素法身未有莊嚴今之報智莊嚴法身功德巍巍斯名為勝如家有寶藏不探似人人孰知勝要須耘除糞穢掘出金藏五慾自恣人乃稱歎此大富人大勝人矣又報智即法法身勝故報身亦勝即報身秀出勝義也應身三者如無量壽佛應極樂國高六十萬億那由他由旬淨華宿王智佛應淨光莊嚴國高六百八十萬由旬釋迦世尊應東方莊嚴國別號照明莊嚴自在王佛佛身高大壽命長遠等即應身廣大義也應多者此經云一中無量無量中一稱性而應隨機而見何可數量即應身含攝多義也應勝準前又如云天上天下唯吾獨尊等即應身秀出勝義也又應即法報法報大應亦大乃至法報勝應亦勝此則舉一即三言三即一不縱不橫微妙寂絕故稱大佛約梵音兼含釋竟更約明言當體釋者夫佛乃萬德之都名大是眾實之美稱豈得以區區一義局彼太虗今尋天台成義復用十種果德釋之雖秪十法而佛之萬德亦包括殆盡言十法者所謂一理大二誓願大三莊嚴大四智斷大五遍智大六道大七用大八權實大九利益大十無住大一理大者所謂究竟三德祕藏一切佛法故一切佛法即性具十法界陰入處界等也三德祕藏即如來藏性色真空性空真色等清淨本然周徧法界也此三德一切佛法唯佛與佛乃能究盡故經云我以不滅不生合如來藏而如來藏俱非俱即等故理大也二誓願大者所謂究竟圓滿三種菩提無緣慈悲無作弘誓普覆法界故經云入於如來妙莊嚴海圓滿菩提歸無所得妙莊嚴海是福究竟即方便菩提亦是生緣慈悲圓滿菩提是智究竟即實智菩提亦是法緣慈悲歸無所得是理究竟即真性菩提亦是無緣慈悲又當機讚佛云大雄大力大慈悲故誓願大也三莊嚴大者所謂究竟不可思議解脫首楞嚴寂照大定成就一切萬行諸波羅蜜故經云塵銷覺圓淨寂照含虗空又云等覺圓明入於如來妙莊嚴海經初云有三摩提具足萬行故莊嚴大也四智斷大者所謂菩提涅槃究竟圓斷法界無明生死故經云覺迷迷滅覺不生迷喻云譬如金鑛雜於精金其金一純更不成雜如木成灰不重為木諸佛如來菩提涅槃亦復如是故智斷大也五徧知大者所謂究竟五眼圓見法界三諦如風於空中一切無障礙故經云我以不滅不生合如來藏而如來藏唯妙覺明圓照法界又云如我按指海印發光故徧知大也六道大者所謂究竟圓入一切法門以二十五王三昧冥益眾生故經云摩登婬女無心修行神力冥資速證無學故道大也七用大者所謂究竟身口意業能顯一切神通謂三輪不思議化彌滿法界顯益眾生故經云一中無量無量中一小中現大大中現小不動道場遍十方界身含十方無盡虗空於一毛端現寶王剎坐微塵裏轉大法輪故用大也八權實大者所謂究竟一切權實之法能為實施權開權顯實令諸眾生入一乘道故經云我以妙明合如來藏十界三諦俱非此以實智究盡諸法之實也十界三諦俱即此以權智究盡諸法之權也離即離非是即非即此權實泯合也又云令汝會中定性聲聞及一切未得二空回向上乘阿羅漢等皆獲一乘寂滅場地故權實大也九利益大者所謂究竟嚴淨一切佛土能以一切世出世法利益眾生故故此經能令登伽證於四果當機頓獲法身及令普會獲本妙心常住不滅又選圓通竟普會大眾凡有十恒河沙皆得本心遠離塵垢獲法眼淨無量眾生皆發無等等三菩提心秖此一會利益尚爾況餘經餘處耶故利益大也十無住大者一切究竟不住究竟一切圓滿無圓滿故經云入於如來妙莊嚴海圓滿菩提歸無所得故無住大也第一還是法身大多勝二三四五并第十還是報身大多勝七八九還是應身大多勝三身不縱不橫復見于此是則兼含及以當體皆不出三身之義三身乃十種三法之一三法體通舉一綱目而九種三法隨來矣蓋由三德具足諸法聚集名為三身若此三德尊重即是三寶三德不生不滅即是三涅槃三德運載負荷即是三大乘三德不可異趣名三菩提三德覺了清淨名三般若三德是如來種名三佛性三德分別不謬是名三識三德即事通理名為三道大則十種三法俱大多則十種三法俱多勝則十種三法俱勝不並不別故稱大佛經云我以不滅不生合如來藏十界三諦若以意會十種三法文義俱成言大佛頂者世尊肉髻無見頂相也頂門為無上果亦表第一義諦如來者大佛頂放百寶無畏光明出生千葉寶蓮有佛化身結跏趺坐宣說神呪之化佛故曰大佛頂如來夫頂居大佛之首佛從頂光而化顯此如來彌為玄極故如來自云斯是知來無見頂相無為心佛惟三身玄極故有此頂有此頂相故能於中放光現佛有此心佛故能宣說心呪有此心呪故能使惡呪銷滅婬心頓除神力冥資速證無學乃至能令十方如來因此執此等得成正覺降魔轉法輪授記付法等事蓋此神呪乃融即三身大佛所證祕藏之理全呪是佛全佛是呪一如無二如者也如來證此故能懾魔阿難迷此是以遭難至此方挹流尋源聞香討根乃以首楞大定為請蓋大佛三身實由妙奢摩他等所剋故經請云十方如來得成菩提妙奢摩他三摩禪那而經題亦因之而召為大佛頂如來密因矣釋此密因為二初顯次密顯復為三初定名次定體三正釋定名者此奢摩他等三名昔資中沇師唯以天台三觀而解彼云準圓覺經奢摩他以寂靜為相三摩提以幻化為相禪那俱離寂靜為相此大意與一心三觀相應寂靜相即空觀也幻化相即假觀也俱離相即中觀也孤山圓師唯以天台三止而釋蓋準涅槃經中奢摩他此云止毗婆舍那此云觀優畢叉此云止觀等今經三名既與涅槃一同二異乃於彼奢摩他中開出三義為奢摩他三摩禪那也而雲間師乃評之云今觀二師之釋孤山所得多矣且如圓覺三法經中亦名為定如彼經云爾時便有二十五種清淨定輪云云又偈云辨音汝當知一切諸菩薩無礙清淨慧皆從禪定生所謂奢摩他三摩提禪那是知彼圓覺尚可直作三止而釋況今經乎矧涅槃顯以奢摩他當定又圓覺三摩名等持禪那名靜慮並是定法名義三止消文復何疑乎今詳雲間所評引圓覺證成今名可作定釋則孤山以三止消文所得果多蓋雖定體融通止即是觀而所主之者須從於別如吳興所謂阿難既以多聞小慧自咎正以楞嚴大定為請也二定體者前之定名欲從所主故偏以定稱若三止之體體無所局故孤山亦會通云此之三止即是三觀以即照而寂即寂而照故奢摩他即空觀三摩即假觀禪那即中觀所以天如會解引孤山三止已乃云今復釋而明之奢摩他寂靜之義也三摩觀照之義也禪那寂照不二之義也此蓋復出孤山會通之義耳況經云是種種地皆以奢摩他中毗婆舍那清淨修證又云此是過去先佛世尊奢摩他中毗婆舍那云云據此二文則不唯此定止觀融通彌顯孤山三止消文當於經旨以云奢摩他中毗婆舍那故第三正釋者約前會通之義雙明止觀也涅槃經中三名奢摩他此云止毗婆舍那此云觀優畢叉此云止觀等今經三名雖與一同二異後文既云奢摩他中毗婆舍那故須雙約止觀而釋於止觀中各開三義謂體真止方便隨緣止息二邊分別止從假入空觀從空入假觀從空假入中道觀今抄止觀成文以明斯義初釋止觀名次釋止觀體初釋名者大師云止觀各有三義止三者息義停義對不止止義息義者諸惡覺觀妄念思想寂然休息淨名曰何謂攀緣謂緣三界何謂息攀緣謂心無所得此就所破得名是止息義停義者緣心諦理繫念現前停止不動仁王云入理般若名為住大品云以不住法住般若波羅蜜中此就能止得名是停止義對不止以明止者語雖通上意則永殊何者上兩止對生死之流動約涅槃論止息心行理外約般若論停止此約智斷通論相待今別約諦理論相待無明即法性法性即無明無明亦非止非不止而喚無明為不止法性亦非止非不止而喚法性為止此待無明之不止而喚法性為止如經云法性非生非滅而言法性寂滅法性非垢非淨而言法性清淨是為對不止而明止也觀三義者貫穿義觀達義對不觀觀義貫穿義者智慧利用穿滅煩惱大經云利钁斵地磐石沙礫直至金剛法華云穿鑿高原猶見乾土施功不已遂漸至泥此就所破得名立貫穿觀也觀達義者觀智通達契會真如瑞應經云息心達本源故號為沙門大論云清淨心常一則能見般若此就能觀得名故立觀達觀也對不觀觀者語雖通上意則永殊上兩觀亦通對生死彌密而論貫穿迷惑昏盲而論觀達此通約智斷相待明觀今別約諦理無明即法性法性即無明無明非觀非不觀而喚無明為不觀法性亦非觀非不觀而喚法性為觀如經云法性非明非暗而喚法性為明第一義空非智非愚而喚第一義空為智是為對不觀而明觀是故止觀各從三義得名更有絕待會異通三德之文茲不具引次釋止觀體分三初次第三止二次第三觀三一心中三止觀次第三止者一體真止止於真諦二方便隨緣止止於俗諦三息二邊分別止止於中道第一義諦體真止者諸法從緣生因緣空無主息心達本源故號為沙門知因緣假合幻化性虗故名為體攀緣妄想得空即息空即是真故言體真止方便隨緣止者若二乘同以無言說道斷煩惱入真真則不異但言煩惱與習有盡不盡若二乘體真不須方便菩薩入假正應行用知空非空故言方便分別藥病故言隨緣心安俗諦故名為止經言動止心常一亦得證此意也息二邊分別止者生死流動涅槃保證皆是偏行不會中道今知俗非俗俗邊寂然亦不得非俗空邊寂然名息二邊此三止名雖未見經論映望三觀隨義立名釋論云菩薩依隨經教為作名字名為法施立名無咎若能尋經得名即懸合此意也雲間楞嚴補遺云孤山以大師三止消今經文則知天台三止有懸合矣故止觀云此三止名雖未見經論映望三觀隨義立名云云今果得之楞嚴矣今謂圓覺三名顯云是定亦唐譯之經彼為最親故知三止懸合二經矣又準涅槃云善男子為三事故修奢摩他何等為三一者不放逸故二者莊嚴大智故三者得自在故復次為三事故修毗婆舍那何等為三一者為觀生死惡果報故二者為增長諸善根故三者為破諸煩惱故準此經文止觀各開三義即是三止三觀之明文次第對義在文不差故谷響鈔云涅槃云為三事故修奢摩他此乃止中具三之明證也而與阿難所請之三宛若符契然大師親見涅槃而不指之者豈非欲使學者自得之乎詳此三止與前釋名名髣髴同其相則異同者止息止似體真停止止似方便隨緣非止止似息二邊其相則別所謂三諦相也前三成次三後一具前三何以故如體真止時達因緣假名空無主流動惡息是名止息義停心在理正是達於因緣是停止義此理即真真即本源本源不當止與不止是非止止義此三義共成體真止若方便止時照假自在散亂無知息是止息義停心假理如淨名入三昧觀比丘根性分別藥病是停止義假理不動是非止止義如是三義共成方便隨緣止相也息二邊分別時生死涅槃二相俱息是止息義入理般若名為住緣心中道是停止義此實相理非止不止是不止止義如此三義共成息二邊止相故與前永異也亦非今所用也二次第三觀者一從假入空觀亦名二諦觀二從空入假觀亦名平等觀三二空觀為方便得入中道第一義諦觀心心寂滅自然流入薩婆若海此名出纓絡經今釋其意假是虗妄俗諦也空是審實真諦也今欲去俗歸真故言從假入空觀假是入空之詮先須觀假知假虗妄而得會真故言二諦觀此觀若成則證一切智也從空入假觀者若住於空與二乘何異不成佛法不益眾生是故觀空不住於空而入於假知病識藥應病授藥令得服行故名從空入假觀而言平等者望前稱平等前破假用空今破空用假破用既均故言平等觀此觀成時證道種智二空為方便者初觀空生死次觀空涅槃此之二空為雙遮之方便初觀用空次覩用假此之二用為雙照之方便心心歸趣入薩婆若海雙照二諦也此觀成時證一切種智是為次第三觀也此三觀與前三觀名一往似同義相則異前貫穿觀觀諸虗妄似從假入空觀達觀達理理和達事事和似從空入假不觀觀似中道觀其相異者前是一諦相今是三諦相又前三通成後三後三具足前三所以者何如從假入空破四住磐石是貫穿觀所入之空空即是理智能顯理即觀達觀此之空理即是非觀觀義如此三義共成入空觀相也從空入假亦具三義如識假名法破無知障即貫穿義照假名理分別無謬即觀達義假理常然即不觀觀義也此之三義共成假觀相也中道之觀亦具三義空於二邊即貫穿義正入中道即觀達義中道法性即不觀觀義如此三義共成中道觀相也三明一心中三止觀者依前摩訶衍明三止三觀之相以義隨相條然各別若論三觀則有權實淺深若論三智則有優劣前後若論三人則有諸位大小此則次第分張非今所用也圓頓止觀相者以止緣於諦則一諦而三諦以諦繫於止則一止而三止譬如三相在一念心雖一念心而有三相止諦亦如是所止之法雖一而三能止之心雖三而一也以觀緣於境則一境而三境以境發於觀則一觀而三觀如摩醯首羅面上三目雖是三目而在一面境觀亦如是觀三即一發一即三不可思議不權不實不優不劣不前不後不並不別不大不小故中論云因緣生法即空即假即中金剛般若云如人有目日光明照見種種色若眼獨見不應須日若無色者雖有日眼亦無所見如是三法不異時不相離眼喻於止日喻於觀色喻於境如是三法不前不後一時論三三中論一亦復如是若見此義即解圓頓止觀相也何但三一一三總前諸義皆在一心其相云何體無明顛倒即是實相之真名體真止如此實相遍一切處隨緣歷境安心不動名隨緣方便止生死涅槃靜散休息名息二邊止體一切諸假悉皆是空空即實相名入空觀達此空時觀冥中道能知世間生滅法相如實而見名入假觀如此空慧即是中道無二無別名中道觀體真之時五住磐石砂礫一切休息名止息義心緣中道入實相慧名停止義實相之性即非止非不止義又此一念能穿五住達於實相實相非觀亦非不觀如此等義但在一念中不動真際而有種種差別經言善能分別諸法相於第一義而不動雖多名字蓋是般若之一法佛說種種名眾名皆圓諸義亦圓相待絕待當體不可思議不可思議故無有障礙無有障礙故具足無減是圓頓顯止觀體也孤山云阿難始以三法為請既蒙開示至乎領解還以三法而歎於佛故經云妙湛總持不動尊妙湛即空智也總持即假智也不動即中智也及佛為富樓那說如來藏本妙圓心非心非空即心即空離即離非三諦炳然如指諸掌及為阿難說六解一亡而結歎云是名妙蓮華金剛王寶覺如幻三摩提華開華現喻即中也金剛堅利喻即空也如幻有形喻即假也洎文殊簡圓通亦以此為歎故曰阿難汝諦聽我承佛威力宣說金剛王如幻不思議佛母真三昧但以佛母喻中道為異耳其於諸文重重演說一一破迷或用乎空或談乎假或顯乎中言偏意圓悉具三法蓋酬阿難三止之請也今謂妙湛總持等三法亦可作止觀各三名而釋如妙湛及金剛王等即止息貫穿也總持及如幻等即停止觀達也不動及妙蓮等即對不止止不觀觀也是則奢摩他等三隨舉其一皆具妙湛等三義經云此阿毗達磨彈指超無學此之謂矣惟此圓融故稱為妙妙即密也言密因脩證者經云是種種地皆以奢摩他中用諸如來毗婆舍那清淨修證漸次深入故云密因修證釋顯竟次密者入道場誦持神呪也經明四種律儀已乃云若有宿習不能滅除汝教是人一心誦我佛頂光明摩訶悉怛多般怛囉無上神呪乃至示以結壇之法定以克證之期其為行者進脩最為詳盡但依經設壇其費大富末世緣薄鮮能辦之於中所立期限共四等合一百二十一日後坐禪百日既云端坐安居則入道之方依奢摩他以脩大定不俟告而可知矣向前初七中云至誠頂禮十方如來諸大菩薩阿羅漢號恒於六時誦呪圍壇至心行道一時常行一百八遍第二七中一向專心發菩薩願心無間斷我毗奈耶先有願教第三七中於十二時一向持佛般怛囉呪云云昔吳興岳師甞按此述脩證儀一卷今雖蔑聞若依天台諸懺通軌亦略可知惟其行道誦呪之頃既涉繁動之緣苟不以理觀而導事行滅罪或難矧夫結壇軌則種種取象言不唐施故溫陵師等皆取意以明表法所謂法王法言即事即理也又且神呪祕密唯佛證知乃密詮三諦之境而稱之為摩訶悉怛多般怛囉呪心蓋有以焉是故行者登壇之時必宜事理兼行顯密雙運如四明師之言三種懺法云法雖三種行在一時寧可闕於前前不得虧於後後無生最要取相尚寬蓋妙觀之宗是大乘之主滅障如翻大地草木皆枯顯德如照澄江森羅盡現以此理觀導乎事行則一禮一旋罪消塵劫一燈一水福等虗空此蓋法華三昧之功勳也彼既如是此亦宜然蓋一心定慧說於呪先四十四心明於此後理須秉定慧而持神呪藉顯密以歷聖階矣次了義者褒美此經所說義無不了也淨名寶積及涅槃等經皆云依了義不依不了義寶積經舍利弗問何等經中名為了義何等經中名不了義佛告舍利弗云若諸經中宣說世俗名不了義宣說勝義名為了義宣說作業煩惱名不了義宣說煩惱業盡名為了義宣說厭離生死趣求涅槃名不了義宣說生死涅槃無二無別名為了義宣說種種文句差別名不了義宣說甚深難見難覺名為了義今經云如來今日普為此會宣勝義中真勝義性即寶積宣說勝義名為了義也經云入妙莊嚴海圓滿菩提歸無所得即宣煩惱業盡名為了義也經云陰入處界本如來藏即生死涅槃無二無別名為了義也經云我以不生不滅合如來藏云云即宣說甚深難見難解難覺名為了義也次諸菩薩萬行者藏通別教皆有菩薩雖可稱諸非今經意今則始從乾慧終至等覺五十六位階級不等故名為諸萬行者即大品般若所說一切佛法諸三昧門所謂百八三昧五百陀羅尼及諸解脫大慈大悲一切種智五眼六神通三明八解脫十力四無所畏十八不共法三十二相八十種好六波羅蜜三十七品四弘誓願四無量心如意神通四攝法等諸法故大品萬行中偈云從初發心至成佛一身一心一智慧欲為教化眾生故萬行名字差別異然此經題雖云萬行而十軸內都不見列一兩種行名但云有三摩提名大佛頂首楞嚴王具足萬行是知題中雖稱萬行實不俟乎別修蓋此密因是首楞嚴定能獲此定則種種萬行法爾現前故南嶽思大禪師釋萬行云如是無量佛法功德一切皆從禪生蓋眾生心性本來具足如是佛法故經云陰入處界本如來藏惟行人修此定時直下照了具足諸法則無量功德功至自至故昔天台一時代南嶽講般若至一心具萬行處忽有所疑思師因誡之曰如汝疑者乃大品次第意耳未是法華圓頓旨也吾昔於夏中一念頓證諸法現前吾既身證不必疑矣以此而知則今經萬行之稱特是表顯密因之妙故云有三摩提名大佛頂首楞嚴王具足萬行也次釋首楞嚴者涅槃經云首楞者名一切事竟嚴者名堅一切畢竟而得堅固名首楞嚴今人釋此名義多分單約定解若然豈大佛頂等非首楞嚴耶矧涅槃經云一切眾生盡有首楞嚴定首楞嚴定亦名般若亦名金剛三昧亦名師子吼亦名佛性且佛性非大佛頂耶三昧般若非密因萬行等耶師子吼非了義耶昔孤山師以教行理三悉號楞嚴而釋蓋有旨焉但孤山三法於經攝義雖足在題主對猶疎今當別約天台八法一一主對釋之謂教理智斷行位因果蓋大佛頂者理也如來者果也密因者智也修證者斷與位也了義者教也諸菩薩者因也萬行者行也故此八法非唯詮義具足亦乃深合經題釋此為二初約八法行布釋次約諸字圓融釋初八法行布釋為三初生起二料簡三正釋生起者八種中教為能詮故居其首七為所詮故居其後於七種中理為所照屬性智為能照屬修非所照之理不能起能照之智故先理次智也智既起已必能斷惑故第四明斷也惑斷理顯種種萬行由之而生故次斷說行也智斷行發淺深不同故有位次也望果德以修因行由因行以克果德智斷行位莫非其事故有第七第八總說四果也二料簡者問智之與行有何差別答智分因果行唯在因問因智與行復何差別答若略作教行理說則因智亦名為行茲廣明八法則因智三止行名萬行矣問位次因果有何差別答因果為能歷位次為所歷又位次開說因果因果總說位次也問此八種中為各各異為互互通答亦異亦通異如向說通者如一經總是八法離能詮無所詮離所詮無能詮故教具七也全理起智無別有智此智能斷離智無斷理顯行彰行是理行六種即理名為位次大乘因果不離實相故理通也智是理智斷是智斷智是首楞具足萬行全理之智雖無淺深淺深宛然雖無因果不離因果故智通也全理之智能斷此惑斷故發行而有淺深不同因果各異故斷通也即理之智能具萬行智斷彼惑萬行斯顯行顯淺深則有位次因果故行通也六種妙位皆即於理雖皆即理六位有殊智為能歷位為所歷智斷惑故自淺之深前五為因後一為果故位通也實相因果無差而差智斷行位條然有異因果實相差而無差智斷行位無不即理故因果通也三正釋者釋此依數為八先理次智三斷四行五位六因七果至於第八方明教相何故爾耶以教無別體秪是七種能詮之聲色耳若七種理顯即是教顯後略分別彌為容易故也於中初明理即經中所詮三諦理也此三諦理徧在十界依正之上若離此則無所寄經明陰入處界本如來藏此之謂也釋此為二初竪約十界明三諦次橫約十界明三諦初竪者此之名義出仁王纓絡二經彼云一者有諦二者無諦三者中道第一義諦初有諦者謂二十五有眾生妄情所見名之為有如彼情見審實不虗名之為諦亦名俗諦虗假凡俗故亦名世諦涅槃所謂如世人之所見者名為世諦此以六凡法界為俗諦也二無諦者三乘聖人所見真空之理無名無相故名為無審實不虗目之為諦亦名真諦真實不虗故亦名第一義諦涅槃所謂如出世人之所見者名第一義諦此以聲聞緣覺兩法界為真諦也三中道第一義諦者遮二邊說名為中此理虗通無壅無塞稱之為道最上無過故名第一深有所以目之為義諸佛菩薩之所證見審實不虗命之為諦故言中道第一義諦此以佛菩薩兩法界為中諦也次橫約十界明三諦者此三諦義出中觀論論云因緣所生法我說即是空亦名為假名亦名中道義十法界皆是因緣生法以佛種從緣故我說即是空十界緣起皆真也亦名為假名十界緣起皆俗也亦名中道義十界緣起皆中也此是橫約十界以詮三諦今釋此二種三諦為三初名義整足不整足二理體圓融不圓融三理體可壞不可壞初義者四教中藏是界內拙度但詮森羅萬象之俗偏空涅槃之真故稟教人至於果成灰斷而已界內通教雖名為巧其所詮者亦只二諦是故稟茲教者同於三藏灰身滅智以為圓極若界外別教教雖不融而初心亦聞但中之名是故稟茲教者以三十心成二觀方便已登於初地得證中道但彼教行歷別而猶未知十界橫具三諦義也若今經三諦則備茲二義如云而如來藏非心非空非地水火風非眼耳鼻舌身意非色聲香味觸法非眼識界乃至非意識界此所非者即纓絡仁王所謂二十五有妄情所見之俗諦也又云非無明乃至非老死非無明盡乃至非老死盡非苦集滅道非智非得此所非者即仁王纓絡所謂出世聖人所見之真諦也又云非擅那乃至非般剌若非阿羅訶三藐三菩非大涅槃非常樂我淨此所非者即仁王纓絡所謂諸佛菩薩所見之中道第一義諦也此是十界竪義橫義者如十界併非此則通以十界為真諦也云何併非以如來藏本妙圓心體絕情偽故次十界併即此通以十界為俗諦也云何俱即以如來藏元明心妙性具十界故次離即離非是即非即此通以十界為中道第一義諦也云何俱即俱非以如來藏妙明心元雖即二邊而無二邊如異故初俱非中云本妙圓心乃以心字為主次俱即云元明心妙乃以妙字為主次雙非即云妙明心元乃以元字為主心者真空也妙者妙有也元者本元中道佛性也蓋自一心而觀何有萬法之差故一切併非而云本妙圓心者猶言即中俗之真也自萬法俱妙而觀則十界宛然故一切併即而云元明心妙者猶言即中真之俗也自本元心性而觀則雙遮二邊真俗俱遣雙照二諦真俗炳然而云妙明心元者猶言即俗真之中道也又經爾前性色真空性空真色等清淨本然周徧法界性中也空真也色俗也並是橫論三諦之義次理體圓融不圓融者若明二諦之理分界內界外則界內藏教為不融以彼徧真理在事外滅色方空故界內通教理名圓融以言即色是空非色滅空故茲明三諦彼通教竪義尚未具足況圓融乎故非所辨今所辨者但對別教為融不融耳蓋別教竪明中道之理如雲外月逈出二邊現在真俗不即中道故須先空次假破有破無此之中理方得分見是故雖有三諦不稱圓融今經三諦既具二義以橫融竪則無竪不橫以竪列橫則無橫不竪無橫不竪則三三宛然無竪不橫則皆名一實妙諦三諦俱實只一十界十界絕待獨一妙心斯則復名無諦之諦故說真諦時則十界併非此名一空一切空無有無中而不空以六凡俱非有亦空也二乘俱非空亦空也佛與菩薩俱非中亦空也說俗諦時則十界併即此名一有一切有無空無中而不有以六凡俱即有亦有也二乘俱即空亦有也佛與菩薩俱即中亦有也說中道時則十界俱非破立此名一中一切中無空無有而不中以六凡俱非破立有亦中也二乘俱非破立空亦中也佛與菩薩俱非破立中亦中也又前性空真色即中真而俗也性色真空即中俗而真也色空並不離性即真俗而中也是故若言真諦者泯諸法名無相而六凡被泯之且言無相矣二乘既亦泯豈非真非真而真即俗乎佛菩薩既亦泯豈非中非中而中道即真即俗乎真諦者泯情不泯法斯謂矣孰謂真諦無相乎若言俗諦者立諸法是有相而六凡被立之且言有相矣所立二乘真諦者有相乎佛菩薩中道者有相乎俗諦者立法不立情斯謂矣孰謂俗諦有相乎若言中諦者雙遮二邊法是但中而六凡二乘之真俗被遮之且言不即矣佛菩薩既亦遮豈非中非中而即二邊乎中諦者統諸法斯謂矣孰謂中道不即乎良由常住真心具足諸法即此諸法充塞天虗彼彼互具名如來藏彼彼互遍名無盡燈雖一塵而十界三諦不少雖剎海而十界三諦不多所謂如搗萬種香為丸若燒一塵具足眾氣亦如剖栴檀柝碧玉若多若小片片皆真故曰九界徒欲言之言則傷其實徒欲思之思則喪其真所以如來掩室於摩竭淨名杜口於毗耶法華三請而不說今經委曲而後談胎經云佛法如大海不說有是非凡夫賢聖人平等無高下法華云諸法寂滅相不可以言宣又云是法非思量分別之所能解今經云一切眾生皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉皆此謂也此之妙法乃諸佛如來所諦故經云我以不滅不生合如來藏云云法華云唯佛與佛乃能究盡諸法實相佛今說之欲令行者全以此諦為脩首楞大定之本得此為本則心心法界事事圓融常住妙果即法圓成觀音智門當念具足此所謂以不生不滅為本脩因而求不生不滅之果者也三可壞不可壞者三藏所詮理在事外要須滅色然後入空此則六凡之俗須壞夫真諦者真必即俗滅色之空非真空也此則二乘之真可壞通教之色雖云即空而未甞云空即是色以空不即色故必灰身滅智此亦六凡之俗須壞壞俗後真真非畢竟此則二乘之真可壞別教中道既不即邊離中之邊故須雙遣此則八界真俗皆壞夫中必真俗彼云逈出二邊離邊之中豈是究竟故佛菩薩中道之理可壞問別教真俗不即中道或云可壞中道佛性豈可壞乎答若論中理實不可壞今言壞者據彼教道所詮耳豈唯別教中道即前三教所有九界真俗若論理體又孰能壞但彼稟教偏小自於夷途作趺好身剜瘡耳故天台云此理灼然世間常住有佛不能益無佛不能損得之不為高失之不為下名之為佛理佛也今經三諦乃是稱此本理而說故真則十界三諦俱非俗則十界三諦俱即中則十界三諦俱非破立真則俱非且言十界三諦可壞俗則俱立中則俱非破立何所可言壞乎須知真乃即中俗之真俗乃即中真之俗非之則法界炳然即之則情謂閴爾經文若此孰能誣哉是為理究竟理究竟堅固之圖
