body:
  text: 天台山幽溪沙門傳燈述大章第五明教相者教者聖人被下之言相者分別異同也釋迦如來所說一代時教適時而進大小偏圓各有區分天台智者大師以五時八教而判釋之昭如日星麗天靡不覽而可別但智者之時此經未至雖嘗企仰終不獲瞻後代諸師既無憑據故阡陌縱橫莫之攸當良由經文互指似非一時而生起有由又如一席以故說者收前則失其後收後則失其前時味之迷其來久矣有宋柏庭法師者法智之雲孫台宗之哲匠也善秉天台判教通軌而以此經大歸之於方等故曰謹按一家判攝規矩凡為五時而有通別別則據其部類通則言其說時又有互遍之義云云但非四時所攝悉得以方等通收故收經長攝法廣唯此時爾此經既不專餘四時部類謂屬方等則無餘論也此論誠為釋經檃括判教指南惜乎其言不廣不能盡破學人封執矧復近代義學急於疏經時味之要皆置而弗論間有一二舉其大節則又莫不習於孤山吳興味同醍醐之說故使柏庭一定之旨翻為時隱天台通別之判舉世蔑聞此無異乎佛法已滅深可慨已百松先師覩斯滅裂忍俊不禁因取柏庭之意擴充其說裁為百問以詰諸方務令即問端以求答意因答處以見旨歸其為定楞嚴天食之時決非亭午闢法華象由之路迥絶兔蹤實此數千言得矣今因釋次秉而用之凡遇事則加之以箋注每問下敢申之以答詞庶使時味易於發明判攝有所祖述云百問總序已下先問五章次辨時味後明八教諸門四悉本迹終推機應以盡疑情惟時味之中一往一復欲明此經的在何時八教之中而審地位蓋位不離教故先問五章問天台智者大師凡釋經題須約五重玄義初明名者欲令行者因筌得魚尋名顯體體既得於名下名為體之先導則知明名不可闕也不知此經以何為名昔孤山印海以人法為名是耶非耶若舍此兩名別有名稱請指其要答今亦以人法為名但人法所以與彼大異已如前釋問經名有七此經之名當何名耶注經名有七者經名甚多天台立七種通名收盡謂單三復三并具足一單三者單人如阿彌陀經等單法如大般涅槃經等單譬如梵網經等復三者人法如文殊問般若經等法譬如妙法蓮華經等人譬如如來師子吼經等具足一者謂人法譬如勝鬘師子吼一乘大方便方廣經等答今經乃復三中人法為名也問經名有通有別有教有行有理此題何通何別何教行理耶答經之一字是通名大佛等十九字是別目若約一化教行理以明通別者通則經之一字別則有七從此七種立名不同即教別同名為經即教通為行不同從一乃至無量即行別同會常樂我淨即行通理雖無名將門名理理隨於門四四十六即名理別門隨於理即名理通觀經疏若約一題以明通別者了義屬教密因萬行修證屬行大佛頂如來諸菩薩屬理首楞嚴通教行理此三皆別以對經字即是三通通別之意任運而有此教行理即是三德所謂教是般若智在說故行是解脫用從緣故理屬法身是所顯故若就諸字互具說者大即法身佛即般若頂即解脫如來者小般若云無所從來亦無所去故名如來此法身如來也轉法輪論云第一義諦名如正覺名來此報身如來也成實論云乘如實道來成正覺此應身如來也密因者奢摩他般若德也三摩解脫德也禪那法身德也以全修在性故修證者修此三德證此三德也諸菩薩者以三般若上求佛道三慈悲下化衆生也萬行者天然之理名為天行即法身德有三摩提具足萬行即般若德低頭合掌彈指散華即解脫德了義者總說此三也首楞嚴者所謂教行理三悉號楞嚴也天台云當知即一達三即三達一一中解無量無量中解一於一字尚達無量況諸字況一題況一經一切經耶此經題目其義善成問所言尋名者意在忘名忘名者意在得體未審此經以何為體昔人以常住真心為體又以禪那顯理為體又以空如來藏為體其所立體同耶異耶經之體者猶衆星之環北辰萬流之宗東海今體罔辨歸者何從答禪那顯理者即經云我以不滅不生合如來藏而如來藏惟妙覺明圓照法界也既云不滅不生又云合如來藏則三師所立之體名雖有異義乃攸同但禪那顯理通而不的空如來藏漫而寡要惟孤山常住真心名義俱正故承用之問古師以圓通妙定為宗亦以甄別真妄為宗有以首楞大定為宗宗之所長未知孰是答二師所立俱得其旨若分別較計則圓通為長然今乃以佛之知見為宗已如前說其甄別真妄自是經用以之為宗亦甚失旨問此經宗體為相即不相即耶相即不相即大師已破今經宗體又何為耶問普賢觀經云大乘因者諸法實相是大乘果者諸法實相是實相因果不異而異故有宗不一而一故有體如斯宗體不定一異倘屬此經為何定耶答今經云若因地以生滅心為本修因而求佛乘不生不滅之果無有是處不生不滅即常住常住即實相因果皆須常住即此經不異而異故有宗常住不離因果即此經不一而一故有體也問此經舊以返妄歸真為用有以廣破性惡為用或以破疑生信為用此等用別義何所從注性惡即性計也性計有四謂自他共無因中論云諸法不自生亦不從他生不共不無因是故說無生答今以破妄知見顯真知見為力用則廣破性惡攝得在中餘如前釋問所言用者力用也力有擲象樹倒之別用有徹鼓不徹之異此經之用擲象耶樹倒耶徹鼓耶不徹鼓耶注擲象等者佛本行經捔力爭婚品云悉達調達及諸王子爭婚瞿夷種種捔力瞿夷爾時在高樓上觀其捔試是諸王子彎常人弓或滿不滿一切諸弓皆悉不任悉達所彎淨飯王曰汝祖王廟中有輪王弓堪任汝彎悉達得之滿彎此弓箭勢一發貫七鐵鼓箭之餘勢仍至水輪乃至斫樹諸王子斫或一或二隨斫隨倒悉達一刀斫過七樹而樹不倒乃至擲象等云云荊溪云此並用中示為凡力未關聖力力中之大不過悉達故智者借喻法華力用昔三教及近成力用如諸王子答徹鼓等法華力用也不徹等餘經力用也今經圓力若對法華迹門佛之知見一往似同再研有異如法華佛之知見所究盡十界十如權實之法與今經不滅不生合如來藏十界三諦是同但彼十界皆究竟顯此經十界顯而猶覆何者蓋十界之中惟二乘保果牙焦種敗心極難轉法華則直會其權當體是實故云汝等所行是菩薩道二乘亦領悟云我等今者真是聲聞以佛道聲令一切聞我等今者真阿羅漢普於其中應受供養今經則斥之云皆由不知二種根本錯亂修習乃至別成聲聞緣覺又云汝先厭離聲聞緣覺發心勤求正道云云並無一言同法華會權之意雖云令汝定性聲聞回向上乘阿羅漢等皆獲一乘寂滅場地然但云獲而已矣未曾說言當體即是此則與法華同而復異若望法華本門開迹顯本而如來久遠本果此經未嘗見一言道及普會之衆亦未嘗想見此則與法華永異將擇其一分與迹門同者則此經亦有徹鼓等力其不同處但是凡弓數百步力耳問或以醍醐為教相或以生酥為教相為用生酥耶為用醍醐耶答應以生酥為教相次辨時味此中一往一復欲明此經的在何時故問此經說何時教何味若時味不知則前後紊亂前後若亂則理義盡差深淺莫辨矣從而釋之者得不以深作淺以淺作深乎若然則調御化儀幾乎昧矣而曰不必究明時之與味可乎問此經孤山等諸師判入法華涅槃之間唯環師判入般若之後又有判歸方等并不一時未知孰當注孤山云此經以上妙醍醐為教相唯被圓機開權顯實與法華無殊扶律談常與涅槃不異吳興云今經所談唯一圓教以明如來藏故非前藏通中間無諸委曲相故非別教環師云楞嚴即般若法中大乘終極之教良由般若慧學方盛定力未全溺於多聞失於正受於是示楞嚴大定資般若深慧既定慧均學解行兩全而究竟於一乘之道此楞嚴之所以作也究夫三經大旨無非大事因緣而必獲般若發明次由楞嚴修證終至法華印可然後盡諸能事判歸方等者乃神智印海柏庭師也柏庭如前所引神智後當引之不一時亦二師一神智二長水下亦當引答今以判歸方等為當問若在法華涅槃之間則味同醍醐時同當午味既同云何容有未全道力之餘味乎時既同云何容有不知真際之側影乎問法華云我今無復疑此經云若此發明不是心者我乃無心同諸土水我實驚怖兼此大衆無不疑惑若謂同味云何法華無疑此又驚疑耶問法華云安住於佛道此經云為彼所轉溺於淫舍若謂同味云何法華安住而於此經轉溺耶問法華化城之人既到寶所彼經云既知是息已引入於佛慧此經云於是阿難及諸大衆觀佛菩提猶如有人明了其家所歸道路此經菩提豈非法華佛慧乎菩提佛慧既同寶所其家何別云何法華已到此方識路耶問法華窮子既領寶藏彼經云我本無心有所希求今此寶藏自然而至此經云發心勤求無上菩提若謂同味云何法華早已領藏此經方勤求而未得耶答誠如所問不屬醍醐問若謂阿難是權不妨此語如吳興嶽師云大權引物唯變是宜且法華既稱開權顯實會權歸實廢權立實云何阿難之權而不開會廢乎問阿難在法華已蒙授記作佛并得法性覺自在三昧世尊開權云我與阿難空王佛所同時發心阿難即時憶念過去無量千萬億諸佛法藏通達無礙如今所聞來至此經反云不知身心本不相代失我本心雖身出家心不入道豈有開顯自覺之後又生迷哉問若謂阿難在實後施權妙玄云華開蓮現華落蓮成華開喻開權蓮現喻顯實華落喻廢權蓮成喻立實由此觀之則知華落之後而不再敷華豈有開權之後而又施權者乎答俱無是理問若謂阿難必欲施權何不施在法華以前待法華開顯耶問若謂法華之後見有楞嚴機興故阿難權施方便接引此一類機且施權引物貴生物信故空拳楊葉能止兒啼若阿難者未得開權之時而法華會機莫不顒望既得開顯之後而人天之衆無不欣知今又實後施權示墮淫室必將取信於誰人哉問若謂楞嚴經前有法華機熟故先開廢則法華招開廢不了之咎何則教既開前而不開後故也彼經云諸求三乘人若有疑悔者佛當為除斷令盡無有餘如此開前四味粗令成一乘妙云何獨存此經一人哉問法華云若衆生住於二地如來爾時即便為說汝等所作未辦乃至云當觀察籌量所得涅槃非真實也若楞嚴經前先出此言而收法華已熟之機法華之後未熟之者又云何耶豈再說法華而收之乎不然則法華有不了之咎若然則法華有重繁之過兩楹無措謂楞嚴同於法華可乎問法華乃純一無雜獨得妙名如云十方佛土中唯有一乘法無二亦無三正直捨方便但說無上道但為菩薩不為小乘此經阿難隨聞獲證四果三果等豈是惟有一乘法無二亦無三但為菩薩不為小乘乎七徵八辨委曲搜揚豈是正直捨方便但說無上道乎二十五聖各陳圓通大小有殊偏圓成異豈是純一無雜獨得妙名乎答誠如所諭不同法華問法華歎教大如海高如山圓如月照如日自在如梵王極如佛若以此經同乎法華何處齊其歎耶答此經教相若與法華相並其中有齊有劣何者如法華歎教大如海妙玄云海是坎德萬流歸故同一醎故法華亦爾佛所證得萬善同歸同乘佛乘江河川流無此大德餘經亦爾故法華最大也文若論此經陰入處界本如來藏之圓同法華諸法實相之圓是則亦齊其歎但有呵斥聲聞狹劣等語終不如法華汝等所行是菩薩道萬善同歸同乘佛乘萬流歸海同一醎味然則是經之海小海而已江河雖歸猶未能盡夫百川也次高如山者妙玄云山王最高四寶所成故純諸天居故法華亦爾住四味教之頂離四誹謗開示悟入純一根一緣同一道味鈍是菩薩無聲聞弟子故文若論此經得陀羅尼入佛知見同彼開示悟入則亦齊四寶所成之歎但經有摩登慶喜初果而之三果阿那而之羅漢終不如法華純一根緣同一道味純是菩薩無聲聞弟子及在四味教相之頂然則是經之山亦寶山也但不得迥居極頂純是諸天秪在山之下停及乎山半雖有四天之所居猶夾夜叉之在下也住世因本經云須彌山下別有三級皆七重墻院夜叉所居第三圓如月者妙玄云月能虧盈故月漸圓故法華亦爾同體權實故會漸入頓故燈炬星月與暗共居譬諸經存二乘道果與小並立文若論此經有不滅不生合如來藏十界同體權實則亦齊月能虧盈之歎但猶存二乘道果終不如法華會漸歸頓不與暗俱然則是經之月弦月也非望月也雖非燈炬羣星之可比豈能不與小暗並立哉第四照如日者妙玄云日能破暗故法華破化城除草菴故又日映奪星月令不現故法華拂迹除方便故文夫二乘人也化城草菴所居之處也若但廢人不廢其處則使先者雖去而後者還來廝下繩繩何時能已故法華破則俱破所謂蕩化城之執教廢草菴之滯情開方便之權門示真實之妙理會衆善之小行歸廣大之一乘上中下根皆與記莂今經雖有定性聲聞皆獲一乘寂滅場地之語但云令汝會中獲之而已尚不廢人矧能廢教及乎隨聞獲證經敘猶是小乘此正方等之中過是已後心相體信入出無難然其所止猶在本處豈同法華執教滯情一切俱破直指聲聞是我親子同年而語哉然則是經之日被蝕初醒之日也僅得一分還光猶是朧恍忽是時星月雖不爭輝而乍有乍無起滅還如熠耀豈所謂皓日當天映奪諸明者乎第五自在如梵王者妙句云輪王號令止齊四天帝釋號令齊三十三天梵王號令總上冠下譬餘經說三諦三昧各不相收不得自在此經所說以實相入真決了聲聞法是諸經之王實相入俗一切治生産業不相違背實相入中諸法無非佛法文若論此經陰入處界本如來藏則亦同實相入中諸法無非佛法而得自在但不能決了聲聞法是諸經之王及不言治生産業不相違背猶未得實相入真入俗而得自在雖有我以不滅不生合如來藏十界俱非俱即俱非破立之文然是佛於三諦自得自在終不能開顯決了令一切人皆得自在也然則是經之王摩醯首羅王也雖得報勝居無色界頂為王終不如梵王居大千之中以統御上下為王也第六極如佛者妙句云此明果第一也餘經明果近於寂場此經明果遠指無量劫前本地故最第一文今經佛告阿難既云汝我同氣情均天倫以此而推亦是寂場近得之果非寂光無量劫前久遠久遠之果然則法華能喻之佛等妙究竟佛也是經能喻之佛十向分真佛也容貌心行雖同分極猶差兩間矣問波斯匿王請佛營齊時當自恣二卷問難猶有匿王洎談七趣乃云琉璃廢父墜海而終可見匿王父子不預法華何謂此經與法華同味耶注波斯匿王琉璃父也廢父緣起出琉璃王經言匿王不預法華者蓋波斯匿王與佛同庚二卷中云我今六十又過于二至第七卷乃云琉璃廢父墜海而終約經定日則匿王父子崩于是年寒際而世尊說法華時年登七旬有二則匿王已逝十載于茲固不預于法華矣是經既有匿王問答孰謂同於法華乎答誠如所顯不同法華問若見是經有是名妙蓮華之句而謂同味則阿含經等亦有妙蓮華之稱豈將小小純粗而並法華純妙乎答名同義異此例固然借使名義俱同今以文通義通收之亦不屬於法華也問若見此經有最後開示之句故置法華之後者且涅槃之後方稱最後何不置耶注經稱最後者乃楞嚴一經之最後非如來一化之最後也縱令即是亦不必置於法華之後以涅槃之後方稱最後故問若謂此經與涅槃同味經中何無唱滅之文若在涅槃之前故無唱滅者法華唱滅後文應置楞嚴之後楞嚴一經應在法華流通之前如斯倒置若曰不可云何同味答誠如所破不同法華問楞嚴一經自夏徂冬法華涅槃共乎八載法華說竟即便唱滅說涅槃經才一日半夜可見事甚急而時甚迫寧將欵欵楞嚴插于迫時之間哉注言楞嚴一經自夏徂冬者此無文證蓋是大約今經文秪十卷欵欵而宣數月足矣經始既值休夏自恣不亦徂於是冬乎問因果經云佛與波斯匿王同日而生今經云我今六十又過于二若除阿含十二方等八年三十成道時當般若第十二年方說此經何謂與法華同味耶注若以此說而定則似判入般若為當但此經說非一時終難以片言隻義而限故有下文之破矣答誠如所定不同法華問若謂此經同於熟酥般若轉教不生一念愛樂之心且云但為菩薩說其實事而不為我說斯真要此經發心勤求無上菩提乃大人光用豈與失明嬰兒同年而語哉問般若領知家業而無希取一餐之意豈同此經疑惑銷除心悟實相者乎問般若所止猶在本處豈獲一乘寂滅場地乎問般若方不夭傷慧命豈不歷僧祇而獲法身乎問般若菩薩遊戲神通淨佛國土聲聞不生一念愛樂豈比應身無量度脫衆生者乎答方等四教並談般若帶通別二正說圓教此經發心勤求無上菩提乃方等四教中之一圓般若不生愛樂乃第四時之一偏耳問若謂此經在般若後故不妨如是等語所謂因般若但慧次立楞嚴大定至於法華印可授記且經云恨無始來一向多聞未全道力若如所判則抑般若以為小慧矣豈般若果小慧乎答般若佛母諸佛由生非小慧之足比也問夫如來說般若之意者蓋為二乘於阿含方等先已得定但執小保果住而不進故以般若空慧之水淘之汰之俾定慧均等至於法華易為開顯今抑之以為但慧則使般若全無所以也此云何通問如來化物舉必有則所謂先以定動次以智拔若謂般若但慧之後方立楞嚴大定且阿含方等二十年間如來何所作為二乘何所利益耶答誠如所諭非般若後也問此經若是般若慧後之定則在法華般若兩者之間今當攝歸何際若法華味同醍醐若般若時同禺中兩難所屬教部何歸為兩楹其歸耶答歸後則礙同法華歸前則礙同般若兩楹其歸固無此理問此經不屬兩際則五時之外須添一時五味之中更加一味別何目名耶天台四教龍樹二輪皆無是例此如何歸答誠無是例教部難歸問若歸般若邊際般若結經自有仁王般若仁王之後又有楞嚴稱為結經可乎注仁王般若為結經者仁王經云如來成道二十九年已為我說摩訶般若故知仁王在大品般若後說仁王經已即說無量義經以為法華弄引故今家指仁王以結般若答固無此理問此經若在方等文云心悟實相回向上乘豈與焦穀敗種同耶答若收後歸前則心悟實相等文自在法華若當時明義則回向上乘之言是方等四教中之圓義也問此經應身無量度脫衆生豈與見不思議自鄙無分同耶注淨名經云摩訶迦葉聞維摩詰說菩薩芥納須彌無所增減海入毛孔不嬈魚鱉等不思議解脫法門歎未曾有謂舍利弗言譬如有人於盲者前現衆色像非彼所見一切聲聞聞是不可思議解脫法門不能解了為若此也智者聞是其誰不發阿耨多羅三藐三菩提心我等何為永絶其根於此大乘已如敗種一切聲聞聞是不可思議解脫法門皆應號泣聲震三千大千世界答應身無量義通大小若小乘應身如目連神通第一亦能化一身作無量身應供於天上人間此方他界雖不能稱機說法亦非一向不能依教利生此約方等當分說也若大乘不思議化彌滿法界一音演唱羣情等悅則是經家約後分之義而敘矣問此經不歷僧祇獲法身豈與三生六十劫同耶注三生六十劫者㭊玄明二乘修行云聲聞利者三生鈍者六十劫支佛利者四生鈍者百劫答今經頓獲法身或方等中圓或法華中義分別準前問此經開示無生法身之理豈與乞乳資身受殃崛維摩之所譏嫌耶注維摩經云昔時世尊身有小疾當用牛乳阿難即持鉢詣大婆羅門家門下立時維摩詰來謂阿難言唯阿難何為晨朝持鉢在此阿難言居士世尊身有小疾當用牛乳故來至此維摩詰言止止莫作是言如來身者金剛之體諸惡已斷衆善普會當有何疾當有何惱默往阿難勿謗如來莫使異人聞此粗言無令大威德諸天及他方淨土諸來菩薩得聞斯語云云時阿難心懷慙愧而作是念得無近佛而謬聽耶即聞空中聲曰阿難如居士言但為佛出五濁惡世現行斯事度脫衆生行矣阿難取乳勿慙即時阿難復詣取乳殃崛譏呵詞意大同茲不繁引答乞乳受呵乃方等中追敘阿含時事正使在於方等今經開示無生法身之理說在後時亦無妨也問此經有宣妙蓮華發菩提心入遍知海若祖王弓滿洞地水輪豈與凡弓數百步而較耶答若約後分言之此義自屬法華若約當分言之則方等中圓與法華不異亦無妨是名妙蓮華之語而褒美之況所引者乃持地追敘往生之事且非釋迦所宣妙法蓮華古師以此言而局是經不亦昧哉問經指楞伽山上破外自然明知不屬方等何同時耶注楞伽破外正是方等之經問謂今經既追指方等中事須別在一時故曰不屬方等答此正前分之語而此經說在方等後時追指前說故無所妨問或不一時教部何收收前則失其後收後則失其前前後收經為有例耶為無例耶無則且置有如何收答經既前後互指所說的非一時天台判攝通軌收經不無其例如四明祖師光明玄記云以凡判教有前後分前分有次後分不定後雖不定須攝歸前今經前分有次後分不定攝歸方等無容置喙矣問若不一時何故經文連貫生起都無間斷耶問既不一時何無追敘昔事乃成一席之說況與摩登伽經所敘無別耶答此乃結集經者要成部類庠序次第生起有由參入後事故連環不絶似乎一席故報恩經優波離問佛曰佛云何一切說為應時適會隨宜說耶為當部黨相從說耶答佛隨物適時說一切法後諸弟子結集法藏以類撰之問若非不一時經有知呵非彈偏意耶經有空藏等文非淘汰意耶經有回向上乘非會歸意耶答由此而知正顯說不一時問若不在方等阿難示墮淫室啓請楞嚴大定執心在內在外局見在面在眼小大同談攝屬何耶答約此前分而判正屬方等問圓師云縱異阿含豈殊方等意謂此經味同醍醐不屬方等且醍醐之圓豈殊方等之圓耶不亦迷法華純一無雜之旨乎注圓師釋四卷中摩登淫息得阿那含云此經惟圓登伽所以證小者以接引小乘故重施小而皆解圓今云那含即圓教相似位也登伽實行乃證那含阿難權人示居初果若以登伽惟作小釋者則使此經全同阿含縱異阿含豈異方等問玄文云藏通別圓之圓義遍三時三時之圓即同第五與法華無二無別更不須開若謂第五之圓不同方等者不亦違背祖教乎問若以此經之圓不與方等圓同方等云譬如日照平地影臨萬水逐器方圓隨波動靜示一佛土令淨穢不同示現一身巨細各異一音說法隨類各解此等語言不成偏劣耶答誠如所破問若不在般若匿王同佛六十二歲數齊般若豈定法不定年乎答若約年定法則應屬般若今為不專般若空慧部類故攝後向前而判歸方等矣問若不在法華經有修菩薩乘入佛知見心悟實相等文如何會通答若約後分則文屬法華若約當分則方等中圓即第五時圓也問判教既約五時五時通別此教何收注妙玄云夫五時半滿論別別有齊限論通通於初後若華嚴頓乳別但在初通則至後故無量義云次說般若歷劫修行華嚴海空法華會入佛慧即是通至二經釋籤云二經者謂般若法華以般若亦得名華嚴故法華佛慧不殊初故又像法決疑經云今日坐中無央數衆各見不同或見如來入涅槃或見如來住世一劫若減一劫若無量劫或見如來丈六之身或見小身或見大身或見報身蓮華藏世界海為千百億釋迦牟尼佛說心地法門或見法身同於虗空無有分別無相無礙遍同法界或見此處山林土地沙或見七寶或見此處乃是三世諸佛所行之處或見此處即是不可思議諸佛境界真實之法釋籤云彼經既有住世無量劫之言又見報身蓮華藏海說心地法門等故知華嚴至涅槃後以彼像法決疑結涅槃故夫日出初照高山日若垂沒亦應餘輝峻嶺故蓮華藏海通至涅槃之後況前教耶若修多羅半酪之教別論在第二時通論亦至於後何者如迦留陀夷於法華中面得受記後入聚落被害作結戒緣起又如身子法華請主後入滅均提持三衣至佛問云云豈非三藏至後耶釋籤云二人雖於法華得記此後猶作三藏結戒之緣故知三藏至後釋論云從初鹿苑至涅槃夜所說戒定慧結為修多羅等藏當知三藏通至於後若方等教半滿相對是生蘇教別論是第三時通論亦至於後何者陀羅尼云先於王舍城授諸聲聞記今復於舍衛國祇陀林中復授聲聞記昔於波羅奈授聲聞記身子云世尊不虗所言真實故能第二第三授我等記釋籤云言此經至法華後者即指王城授記同于法華舍衛國記即指方等在法華後故知方等在法華後般若帶半論滿是熟蘇教別論在第四時通論亦至初後何者從初得道夜至泥洹夜常說般若又釋論云須菩提問畢定不畢定當知般若亦至於後釋論云大論三十九先舉經云須菩提白佛言世尊菩薩摩訶薩為畢定為不畢定佛言畢定非不畢定須菩提言為何處畢定佛言非二乘道中須菩提復問為初心菩薩為後心菩薩佛言初心及跋致皆悉畢定須菩提於法華中已聞菩薩得記故已畢定今復更問故知須菩提更為未入者問故知法華之後更說般若明矣般若不殊故結集者同為一部若涅槃滿教別論在第五時通論亦至於初何者釋論云從初發心常觀涅槃行道前來諸教豈無發心菩薩觀涅槃耶大經云我坐道場菩提樹下初成正覺爾時無量阿僧祇恆河沙世界諸菩薩亦曾問我是甚深義然其所問句義功德亦皆如是等無有異如是問者則能利益無量衆生此則通至於前若法華顯露邊論不見在前祕密邊論理無障礙故身子云我昔從佛聞如是法見諸菩薩受記作佛豈非證昔通記之文釋籤云通記者昔日授記佛意不壅小乘情隔自無希取況約祕密已記二乘據斯以論通至鹿苑答古師所謂收通歸別也問結經須約文通義通攝歸時味此經文何通義何通文何歸義何歸耶答北峰本無師云文通義通者如後分華嚴及方等陀羅尼之流乃結集經家收通歸別皆文通也若義通者如般若明華嚴海空與夫蓮華藏海通至涅槃之後此於他部明華嚴義不必結歸本部今楞嚴經前分有次後分不次收歸方等似合其宜如先達所謂一代教中除華嚴般若法華涅槃別部帙外凡所說小乘皆收歸鹿苑凡所說大乘皆收歸方等柏庭玄覽云但非四時所攝悉得以方等通收之此經既不專餘四時部類謂屬方等則無餘論也雖經有定性聲聞皆獲一乘寂滅場地之言但云令汝會中而已固不與法華同日而語政使出於方等不妨以彈斥意密示與進況時在其後說亦無違文此則經之前分正屬方等是故云爾若經有耶輸受記等文應是後分經乃結集家收通歸別結歸前文此正通五時中文通之類也問此經為全分耶為有前後分耶若有前後何處為前何處為後若然者以後歸前耶以前歸後耶答此經有前後分但所判不同長水師乃以第八卷文殊問名已還判為前分廣辨七趣去判為後分神智師判前後分則不定指謂經文有次第者前分也互相指者後分也結集者以後分明義氣類若同向前集之如金光明經是方等後分乃指般若為己廣說空若其然者今經波斯匿王年六十二又云是名妙蓮華定性聲聞及諸一切皆獲一乘寂滅場地豈非亦是後分之經耶今詳二說神智為當後明八教諸門四悉本迹此中寄明地位蓋位不離教故問此經若是頓教所攝經文何故從粗入細自淺而深如七徵八辨五陰六入十八界等次第入藏耶又如初果而之二果阿那而之羅漢此皆漸入之相云何為頓答夫言頓者須分人法若論此經所說之法則一向是頓如經初發軫即云一切衆生不知常住真心性淨明體舉此一端餘可知矣其陰入處界雖次第而宣乃次第之漸非漸頓之漸所謂說雖次第理非次第也若論能入之人先假七徵八辨然後初果而之二果阿那而之羅漢似應判入漸教然觀當機最初即以奢摩他等而為請由至於不歷僧祇頓獲法身是亦不漸中漸入之漸終非偏漸之漸也問此經若是漸教所攝云何經有忽然狂歇頭非外得歇即菩提不從人得之文耶答以此而知正屬於頓問若謂是漸漸初耶漸中耶漸末耶注漸有二一漸部二漸教頓亦如是前問頓漸之漸漸教也今言漸初等者漸部也漸部有三阿含為漸初方等為漸中般若為漸末若方等四教並談般若帶通別二正說圓教則前之二三部教俱漸後之圓教部雖在漸教實在頓乃圓頓之頓也答是漸中問若漸初者阿難在家屬十二年前阿含第八年中方始出家其年八歲縱盡阿含止年十二豈被摩登牽攝淫躬撫摩而毀戒體耶由此推之明知不屬漸初寧有定法不定年乎答正由此說不作漸初問若中末者已如方等般若所奪必謂中末云何會通答今經既屬方等故是漸中然是漸部之漸終非漸教之漸會通之文已如前說問此經若是祕密教收如或為此人說頓或為彼人說漸說不定或為此人說漸或為彼人說頓說不定說默相對互不相知方為祕密今經之文何為祕密耶答此經是顯露非祕密問此經若是不定教收此則如來不思議力一音演說隨類各解能令衆生於漸說中得頓益於頓說中得漸益如是得益不同方為不定今經乃云是諸大衆得未曾有各各普獲金剛三昧又云如阿難輩習漏未除兼此大衆無不疑惑如此同聞同解何為不定答誠如所諭非不定也問經有天龍八部有學二乘新學菩薩其數凡有十恆河沙皆遠塵離垢得法眼淨惟性比丘尼別成羅漢無量衆生發菩提心如此聞同證異是不定否答約證雖殊約解恆一故非不定問此經若屬藏教文云於菩提心未自在者又云修菩薩乘入佛知見又如二十五聖之中有諸聲聞指稱鹿苑所證此既追敘昔事明知不屬三藏何為攝耶答誠如所諭不屬藏教問若非藏教阿難不知心之內外目之所在執眼能見認賊為心與藏胡別耶答此是大權引物入如來藏從凡至聖深淺階差文雖似藏意非藏也問此經若屬通教所謂通者通前藏教通後別圓此經何處通前何處通後耶問此經若屬別教所謂別者別前藏通別後圓教此經何處別前何處別後耶答今經始末惟談圓義通別兩教不能預此問此經若屬圓教理宜飽餐王膳云何經有不知寂常心性如人說食終不能飽之言耶答此是首卷之文當機正為顯發圓義故以不知寂常如人說食之問以為請由若第三卷中不歷僧祇頓獲法身方是當教中圓餉餐王膳也問凡立地位必依教為此經地位依何教耶答依圓教也問依藏經有地等依通非止十地依別無明品多依圓名字相濫今經地位云何定耶答誠如所並不屬前三以義定圓名則不濫問一家明位以經論異文有借位之義此經地位借何教名名何教位耶答今經位名三教俱借借三教名名圓教位也問大品通教有乾慧地今經圓教亦立乾慧何耶答此正今經借通教位也問藏教加行有暖頂忍世第一位今經列為圓教加行何耶答此正今經借藏教位也問常途立位等覺一生即入妙覺今經等覺之後始獲金剛心中初乾慧地何耶答此正今經借別教之位如纓絡別位等覺性中有一人名金剛幢慧是也由此菩薩以大願力住壽百劫修千三昧破最後微細無明而今始獲故云金剛心中初乾慧地問如此位次參雜為名同義異耶為名同義同耶答雖借前教之位是種種地皆以奢摩他中用諸如來毗婆舍那清淨修證故名雖乍同而義理逈異問四教各有四門此經何教何門入道耶若藏之四門則門門皆見藏義今經一一會歸藏性豈藏門之義乎答今經乃依圓門入道而三藏之藏蓋以經律論各含一切文理為義比之如來藏性具足十界三諦霄壤相懸又藏等諸門雖皆見藏但是約三界生滅實有之有滅有歸無之空而互論雙亦雙非以離斷常而已今經會歸藏性乃祕藏之理故空則十界三諦俱非有則十界三諦俱即雙亦雙非則十界三諦俱非破立豈藏門之足較哉問若通之四門應見通義云何遞遞生起世界衆生業果等事耶注通之四門應見通義者通教入道門雖有四要之通以幻化為主故妙玄云通以若業若果善惡等法乃至涅槃皆如幻化譬鏡中像雖無實性而有幻化頭等六分是為有門諸法既如幻化幻化本自無實無實故空乃至涅槃亦如幻化如鏡中像假有形色本不可得是為空門諸法既如幻故名為有幻不可得故名為空如鏡中像見而不可見不可見而見是亦空亦有門幻有尚不可得況復幻空而當可得即是非空非有門答四教四門雖殊莫不皆以因緣生法為所照境故通之四門皆歷若業若果善惡等法以明如幻之義即今經世界衆生業果遞遞生起亦其事也然所照之境雖同能照之觀則別以今經所詮惟圓門故雖有如幻三摩提及如幻等十種深喻之言此是圓家妙體三止義言如幻也問若別之四門經中止用一奢摩他何耶注妙玄云別教四門所據決定妙有善色不關於空據畢竟空不關於有乃至非空非有亦如是文是故能入之觀三不相即要須先空次假後中歷別而進今經前後既止用一奢摩他故非歷別義也問經之前後亦有時言三摩有時又雙舉云修奢摩他毗婆舍那云云至總結禪境又云禪那現境何言前後止一奢摩他耶答經之前後雖有三名皆是奢摩他中間出此義已如釋密因中說又言毗婆舍那者所謂奢摩他中毗婆舍那也故知雖有三名只是一義蓋今經標心在於大定以奢摩他屬於定故答誠如所難非別門也問若圓之四門云何聞大證小止得小果耶答今經聞大證小惟摩登慶喜二人摩登既非當機且置不論若慶喜所證名雖在小義無不圓蓋圓家斷惑亦約不次而次所入因位比前三教亦不齊而齊如初信斷見惑與初果齊乃至七信斷思惑與四果齊所謂同除四住此處為齊也阿難既先是小乘經家乃順其本習即以小果敘其圓證況部在方等借位宜然若不爾者則當機自敘不歷僧祇獲法身等語難以會通矣問四教之中單約有等四門何門入道有門不應一切俱非空門不應一切皆是雙亦雙非例此可推其入道者是何門耶答經中所以一切俱非俱是等者由今經圓教四門等開門門法界攝法無餘故說空門非則四門俱非說有門是則四門俱是至於雙亦雙非莫不咸爾蓋他經所說乃以六凡為有二乘為空菩薩為雙非佛界為雙亦今經既云我以不滅不生合如來藏而如來藏妙明元心十界俱非此即空則四門俱空也又云而如來藏元明心妙十界俱即此即是則四門俱是也又云而如來藏妙明心元離即離非是即非即此即四門俱離即離非以為雙非四門俱是即非即以為雙亦也然雖四門俱立而入道之要約義當依有門有門即十界也以四門皆不離十界而說故故依有門所修之觀曾於釋名之中備明十乘觀法皆是此義是則經中或奢摩他或三摩或禪那皆須照此妙有耳根圓通即其要焉經云一門超出妙莊嚴路又云但於一門深入彼六知根一時清淨又云我從耳門圓照三昧緣心自在又云此是微塵佛一路涅槃門又云十方薄伽梵一路涅槃門皆此謂也問四門之中各有四悉是何悉檀得益耶若為人何處為善根未發耶若世界何處為未種善根耶若對治何處為未破惡耶若第一義何處為已熟耶問四悉既稱利益聞者此經何處是信戒進念而得開發謂為人耶問悉中既有世界此經何處是歡喜讚用受行耶問貪恚愚癡豁爾氷消謂之對治革凡成聖入法流水謂第一義今經何文是耶答一經所說無非如來以四法遍施衆生若隨聞獲益其文蓋多今且以一人言之如阿難為登伽所攝即未種善根也七徵八辨正是為種善根而阿難猶故種種迷執即善根未發也約陰入處界明如來藏廣破因緣自然正是破惡而阿難猶執世諦以疑第一義諦即惡未破也如來更約如來藏性色真空以明七大非和不和直使阿難情盡理窮即是善根已熟也及乎豁然大悟頓獲法身於如來前說偈讚佛所謂歡喜讚用等四益一時頓得矣此猶一往若二往說世界中非無為人等乃至第一義中非無世界等如如來藏者第一義也乃歷陰入處界種種差別而辨此即世界也莫不擬宜當機令生正念即為人也廣破因緣自然即對治也是故一經之中種種言說若以意會無非悉檀問既有四悉必對五章且為人何對耶乃至第一義何對耶答妙玄云世界悉檀對釋名名該一部世界亦冠於三第一義對體最分明為人對宗宗論因果為人生善義同對治對用用破疑滯與治病事齊分別悉檀對於教相也終推機應以盡疑情問此經機應為本耶為迹耶本經何不顯迹為久耶近耶答此經機應是迹非本亦是近迹非久迹也開迹顯本功在法華今經方等未預其事問應者佛也佛為弟子之師今師之本為道樹已前之本為道樹已後之本前則無文所據後則礙同法華其本也何定乎注道樹菩提樹也自世尊近迹言之六年苦行已畢于菩提樹下實智始滿起道樹始施權智今言道樹已後之本即始證之實智也若言道樹已前之本此中仍有遠近法華壽量品塵點塵點所喻之劫為遠本道樹已前一節兩節去為近本今云道樹已前之本即壽量品中之遠本也言前則無文可據後則礙同法華者諸師既判此經同於法華應是遠本奈何無文可證若云道樹已後之本又與法華遠本有礙矣答若論說法華之佛即是今佛法華既指遠本為本今佛之本又豈異乎但此經未經開顯雖有遠本敝而不言隨情而說猶是道樹已後之本既有礙於法華不同醍醐也明矣問機者二乘弟子也今弟之本為未入權實二智已前之本為入實甚久亦先解行權之本先解行權若未開顯雖本而不敢言今經既無開顯何謂同於法華注妙玄云諸經明二乘弟子不得入實智亦不能施權智今法華經明弟子入實甚久亦先解行權問此經之應若謂是本本則同於法華法華云我實成佛來久遠若斯又云一切世間皆謂今始得道我成佛來無量無邊那由他劫若以此經同於法華何故無如是言耶答誠如所諭非遠本也問華嚴前後推之遠迹近迹楞嚴得非近乎注言華嚴前後推之者自華嚴已前塵點劫已後中間數數唱生數數唱滅為遠迹華嚴已後五時施化為近迹答誠如所諭是近迹也問所言本迹者此經本迹為即迹之本即本之迹若迹本不二義同法華何無文證耶答若約當部言之則本迹有殊若跨節會之則本迹不二未經開顯故無證文問此經之機何機耶為權耶實耶若如孤山等諸師謂是大權雖是小果即同大證所謂名同體別若爾苟按位升進進何位接何位能接之教為別耶圓耶答當機慶喜誠是大權若按位升進則所證初果進今二信二三果進四五六信既是升進信位即是圓教受接經雖無文義合如之問夫應者佛也此經之應是何佛耶為本菩提樹下生草為座之佛耶為七寶菩提樹下天衣為座之佛耶為蓮華藏世界大寶華王為座之佛耶為以虗空為座之佛耶機之與應乃教之大節置而不明為可乎為不可乎答生草為座者藏教佛也天衣為座者通教佛也寶華為座者別教佛也虗空為座者圓教佛也圓佛是法身別佛是報身藏通是應身法身屬本有是一性報應是莊嚴屬二修雖是一性全性起修雖是二修全修在性如天王三目世伊三點舉一即三言三即一者也是故四教三佛難以相之多少而定勝劣須以鑒機及所說法在圓則圓在偏則偏矣如今經教主若約現迹而觀始既休夏自恣赴波斯匿王之請洎阿難答發心見相之由又曰我見如來三十二相勝妙殊絶豈非藏教丈六老比丘乎及乎敷演經義則唯一圓理觀機拯溺則獨一圓鑒由此而稽又是圓教法身之佛今以生草為座者蓋是為化窮子示現如斯所謂脫除纓絡細軟上服更著粗敝垢膩之衣其實垢衣內身即是纓絡長者祇為未經開顯群機猶未即知若觀阿難說偈讚佛然亦未嘗不知今佛即以虗空為座也問今經唯演圓常此說可爾若鑑機者且經文何處是其鑑機那又知是圓鑑答天台云佛之鑑機有乎多種若言一日三時入定觀可度機此三藏佛照九界機析空感應也若言即俗而真不須入出任運能知此通教佛照九界機體空感應也若言用王三昧歷別照十法界機此別佛次第感應也若言王三昧一時照十法界機此法佛圓妙感應也今阿難既啓請十方如來得成菩提妙奢摩他正是佛界寂光之機經中又不言入定觀機等事但云如來知彼淫術所加此知之一字即是無緣慈悲寂而常照之地所謂以王三昧一時頓照者也問如來知彼淫術所加此則正同通教不須入出任運而知云何謂是圓鑒答任運而知界內通佛界外圓佛皆有此義須以所鑒機之多少理之偏圓以分勝劣如藏通兩佛與而言之雖云能照九界真俗奪而言之秪能照於八界真俗以菩薩所證同二乘故若別圓二佛俱能照於十界三諦惟有次不次之分今經既云我以不滅不生合如來藏十界三諦俱非俱即俱非破立以後驗前故知必是圓鑒上所録百問是先師再定之藁故與舊刻稍有開合去取之異其間雖前起五章後訖諸門四悉等求其正意惟在辨明時味蓋為時師於法華純絶之圓混同方等對粗之妙故委曲搜𫾻以成百問觀其末云機之與應乃教之大節置而不明等云云此其意良亦勤矣研味之者須識旨歸
