body:
  text: 天台山幽溪沙門傳燈述次明智究竟者三智也名義出大品般若及釋論所謂一切智道種智一切種智欲成此智必籍觀因空觀為因證一切智假觀為因證道種智中觀為因證一切種智若就理實論則觀之與智皆通因果例如佛性通於因果別則因名佛性果名涅槃今就別義一往分觀因智果也此之三智在今經中因名妙奢摩他三摩禪那若論其果出名則有多處如首卷中云無始菩提涅槃元清淨體云云二卷云此見及緣元是菩提妙淨明體等此皆即因心以指果德也七卷初地云於大菩提善得通達此指分證果德也十卷云圓滿菩提歸無所得此指究竟果德也云云今例前三諦以分二種一竪合十界三諦之三智二橫合十界三諦之三智初義者釋論明兩種三智初為易解故分對三人聲聞對一切智菩薩對道種智佛對一切種智是則一切智竪合聲聞緣覺法界之真諦也道種智竪合六凡法界之俗諦也一切種智竪合佛菩薩法界之中諦也二橫合十界三智之三智者論約三人對三智已復云三智實在一心中得秪一觀而三觀觀於一諦而三諦一諦三諦與今真則十界三諦俱非義同一觀三觀與今妙奢摩他三摩禪那義同諦是智之所諦觀是智之所因既有所諦之境必有能諦之智既有三止之因必有三智之果蓋是經文總略但云我以不滅不生合如來藏耳況不滅即寂滅不生即無生寂滅忍是究竟三智之總體無生忍是分真三智之總體以此義例是則應云我以不滅不生一切智合如來藏之真而十界三諦併非等云云也辨此為三初名義周足不周足二智體圓融不圓融三名體俱轉不俱轉初義者藏通二教因既單修空觀果智豈能周足故釋論唯用一切智以對二乘若別教次第修乎三觀登於十住空觀成證一切智即釋論分對聲聞果也登於十行假觀成證道種智即釋論分對菩薩果也登於初地及妙覺中觀成證一切種智即釋論分對佛果也如此次第唯是竪合十界三諦之義耳若今經三智則具足橫竪二義如我以不滅不生合如來藏真諦則十界三諦併非非六凡俗諦者一切智也非二乘真諦者道種智也非佛菩薩中道者一切種智種類知也約竪義雖有三種望橫義秪是一切智耳以一切併非為主故次我以不滅不生合如來藏俗諦則十界三諦併即即六凡俗諦者道種智也即二乘真諦者一切智也即佛菩薩中道者一切種智寂滅相遮二邊也約竪義雖有三種望橫義秪是道種智耳以一切併即為主故又次我以不滅不生合如來藏中道則十界三諦俱非破立六凡俗諦俱非破中道雙照之道種智也俱非立中道雙照之一切智也雙俱非破立中道雙遮之一切種智也二乘真諦俱非破中道雙照之一切智也俱非立中道雙照之道種智也雙俱非破立中道雙遮之一切種智也佛菩薩中道俱非破一切種智雙遮二邊也俱非立一切種智雙照二邊也雙俱非破立一切種智寂滅相種種行類皆知也約竪義雖有三種若望橫義秪是一切種智耳以俱非破立為主故此則秪一不滅不生合如來藏三諦而橫竪二種三智悉得具足矣二智體圓融不圓融者別教三智但今經三智中之一竪義耳豈足以稱圓融今經三智如上所論若以橫望竪則有三三以竪望橫仍是一三一三相即三亦無寄一三三三唯是一心故經唯以一不滅不生而當之矣蓋三諦者所合之境也三智者能合之心也諦既即一而三智亦即三而一矣又諦如函底智如函蓋豈唯際畔相當亦乃諦智冥泯泯而無際獨一常心故經云我以不滅不生合如來藏而如來藏唯妙覺明圓照法界天台立境智四句云智照於境境照於智智照於智境照於境並此圓照法界其義善符三名體俱轉不俱轉者前之三教因行既昧性具三觀皆成別修是故至果不唯名轉體亦須轉今經圓止雖曰一是性具二是修成乃全性起修修非別有是故終日修而無修終日作而無作蓋以佛之自諦而為大定之本一一皆全修在性故也圓融三智合圓融三諦圖故天台釋三般若云般若名實慧實相般若非寂非照即一切種智文與今禪那寂照不二義同又云觀照般若非寂而寂即一切智文與今奢摩他寂靜義同又云方便般若非照而照即道種智文與今三摩觀照義同是則今之三智雖從勝而受大菩提圓滿菩提等之稱其實體無所轉蓋因果皆不異於寂照義故經云是名妙蓮華金剛王寶覺此其是也是名智究竟第三斷究竟者用前三種智慧以斷三惑也一見思惑從解等得名即利鈍十使分品有八十八八十一之夥此障真諦理二塵沙惑從所障諦理得名以法門如塵沙之多一一不能了知故此障俗諦理三無明惑不了法界無所明也大分有四十二品此障中諦理此三惑名義在今經中但出見思無明兩惑經云我等今者二障所纏良由不知寂常心性解云煩惱所知名為二障煩惱障謂根本及隨此即見思惑所知障亦云智障障一切種智故此即無明惑又云一切眾生不成菩提及阿羅漢皆由客塵煩惱所誤此說見思惑又云清水現前名為初伏客塵煩惱去泥純水名為永斷根本無明此說見思無明兩惑又云得須陀洹果已滅三界見所斷惑然猶未知根中虗習彼習要因修所斷得何況此中分劑頭數見修所斷即見思惑分劑頭數即無明惑云云所以經中不言塵沙者以克論諦理但有中真則能障之惑亦只兩種故煩惱所召生死亦分段變易而已但此真中遍在十界依正之上即此十界名之為俗以性具故稱為諦理故諸佛二障既除二諦理顯神通妙用皆從此發故得名為無謀而應華嚴一微塵中出大千經卷此之謂也今經三諦所以不離十界而辨亦是此意若然則惑秪有二何得立三答此有三意一因別人不知性具要須別學是以十住菩薩知所入空未是畢竟乃從空入假於無量劫遍習遍學導利羣品故名塵沙二圓人既知心性本具則一切眾生不唯不見真中二理亦復不得本有妙用障真中者是二惑矣障妙用者豈不又是一惑但圓人不須別破此惑初心直下稱性觀中至於觀成自然而斷故種種法門稱性施設故止觀云圓教十信六根淨時即能遍見十法界事五品正行六度廣能說法皆是入假之位又初心之人能知如來秘密之藏圓觀三諦尚能即中豈不能即假乎三者例能觀之觀諸經既立有三則所破之惑亦依義立三矣問若諸佛二障除已真中之理方顯神通妙用皆從此發名之為俗是則先應破見思無明然後斷除塵沙何故塵沙先破方斷無明答若定理而論誠宜破盡無明俗諦之理方究竟顯今破見思惑便言破塵沙顯俗諦者良由見思麤垢先落又侵界外無明麤垢中理雖未現前俗諦亦得相似而顯化導之功亦得少分無謀而應菩薩既急在度生即乘此以導利羣品以此少分見者得名塵沙惑斷俗諦理顯也問見思以五利五鈍為體塵沙無明以何為體答無明無別體相即以見思為體但麤細差殊有界內界外之分故天台云別教三十心斷界內見思伏界外見思無明十地斷界外見思無明若圓教十信斷界內見思圓伏界外見思無明發趣初心斷界外見思無明終至等覺方盡故地持明清淨淨禪云離一切見清淨淨禪大涅槃云十地菩薩為無我見論惑所轉又云十地菩薩雖見佛性而不了了諸佛如來見於佛性而得了了此皆約見惑盡不盡故有了了不了了等殊也問界外見思為只有四十二品為更多耶答今言四十二品者以大乘經論多說分真及究竟有四十二位故大約作此數耳若論無明重數豈有品量蓋入位轉深能斷之智轉利於一位中難定斷若干品惑故大師云後心菩薩無功用道其疾如風一日之間能破無量品無明惑障何況纓絡經明等覺地於百千萬劫入重玄門報脩凡夫事乎今例前諦智分二種斷義一竪斷障十界三諦無明二橫斷障十界三諦無明辨此為三初名義全不全二伏斷次不次三無明斷不斷初義者界內二教既不詮中道之理無明名字尚不得聞何況伏斷是故極至果頭但只竪斷阻二乘真諦見思惑而已若別教所詮雖名但中能覆之惑別圓不異但彼要至初地纔破一品極至妙覺破一十二品只成一往竪義非如圓家橫竪具足登於初住即破無明竟至妙覺共四十二位須破四十二品方名究竟故今經初住即能十用涉入圓成一心如是重重單複十二方盡妙覺也次伏斷次不次者別人修因既先空次假後中伏斷之時豈能不次是故至於十信方伏界內見思十住斷界內見思兼斷界內上品塵沙十行斷中品塵沙十向斷下品塵沙至此方伏無明登於初地方破無明是為竪伏竪斷義也今經外凡即能用一心三智圓伏障十界三諦之惑故乾慧地中即云欲愛乾枯根境不偶現前殘質不復續生等經歎彈指超無學亦此意也十種信心名為內凡界內見思自然先落故初信即云圓妙開敷從真妙圓重發真妙等云云若登初住斷一品無明證一分三德十種大果分得現前現十界身百界作佛故經云是善男子以真方便發此十心心精發輝十用涉入圓成一心名發心住從於此去極至妙覺無明轉轉破功德轉轉勝是為一斷一切斷也問既云一斷一切斷云何信位先斷見思及以塵沙答四教儀云圓人本期不斷見思及以塵沙意在入住斷無明見佛性雖不期斷而見思麤垢自然先落譬如冶鐵意在成器器雖未成麤垢先落雖見先落其人無一念欣心以未遂所期故故妙玄云同除四住此處為齊若伏無明三藏則劣斯則名為以橫伏竪以竪破橫以橫伏竪故初心五住頓伏以竪破橫故見思麤垢先落故阿難問云又此五陰為併消除為次第盡如來答云此五陰元重疊生起生因識有滅從色除理則頓悟乘悟併消事非頓除因次第盡問若橫伏亦橫破而言圓勝於別可爾既橫伏竪破與別不異又何貴于橫伏乎答若竪伏竪破成功則難橫伏竪破奏勳則捷如澄濁水愚人則旋取旋澄故遲迴日久智者總取置一大器雖百千斛日可頓得以此喻知則圓別勝劣較然矣三無明斷不斷者別教但明斷無不斷義以常住佛性名為但中生死煩惱皆非性具故空觀破見思已六凡法界隨壞假觀破塵沙已二乘法界隨壞中觀破無明已己界菩薩亦壞至於果地自謂蕭然是為緣理斷九非今所論今之圓教則具斯二義謂亦斷亦不斷言不斷者以圓人悟一切法皆是性具離菩提無煩惱離煩惱無菩提煩惱不能障菩提菩提不能破煩惱故淨名云佛為增上慢人說斷婬怒癡名為解脫無增上慢者婬怒癡名為解脫無行經云婬怒即是道又云六十二見為如來種即六根六塵而無限閡只眼中見色亦眼中入三解脫門華嚴明十眼乃至六眼皆明於一塵中具十方三世諸佛八相成佛轉法輪度眾生等事涅槃云誰有智慧誰有煩惱而言毗婆舍那能破煩惱今經云五陰六入本如來藏常住妙明又彰自證中十界苦集皆即元明心妙此等諸經皆說不斷而明了也言斷者前不斷之言蓋約至理虗玄無明體相本自不有以閑眾生之情計耳究論成佛何處有天生彌勒自然釋迦且淨名云若無增上慢人婬怒癡即是解脫者今人誰無增上慢乎若不增上慢者終不應言己即是佛何以故於婬怒癡未得蕭然無累故六根六塵亦未得無限閡故亦不能如華嚴於一塵中成佛轉法輪故須知諸經言即者理即也若不知此即空所由而妄生取著所謂鼠唧鳥空矣故華嚴等諸大乘經皆明歷位修行斷惑之相涅槃云暗時無明時明時無暗時有煩惱時則無智慧有智慧時則無煩惱今經云如澄濁水貯於靜器靜深不動沙土自沉清水現前名為初伏客塵煩惱去泥純水名為永斷根本無明又云汝勗修行欲得菩提要除三惑又云三緣斷故三因不生心中達多狂性自歇歇即菩提不從人得此則名為不斷而斷斷而不斷不斷而斷故十界三諦併非斷而不斷故十界三諦併即斷與不斷兩義俱時故十界三諦俱非破立故寂調音天子問文殊師利言寶相如來世界以何說法仁者樂彼答云彼所說法不為生貪欲故不為盡貪欲故不為生嗔恚故不為盡嗔恚故不為生愚癡故不為盡愚癡故不為生煩惱故不為盡煩惱故所以者何夫法本無生則無有盡此即不斷而斷斷而不斷之誠證也是名斷究竟次明行等究竟者問前理智斷三法皆論橫竪二義後行位因果中亦得例否答約義皆有如初心修首楞大定以三智合三諦達此一境具足萬行至於初發心住萬行於一心中發此即橫也初住二住至於等妙所發萬行分極不同此即竪也五十五位以分六即六不妨即橫也即不妨六竪也大乘因果皆是實相橫也實相體通因果宛然竪也今先明行究竟題中諸菩薩萬行經中三摩提具足萬行也經題經首總標雖爾洎乎下文未甞略言萬行具足之義然則具足之義果何似乎今以義求不出有三曰本有為具該攝為具積聚為具也初本有者眾生心性法爾具足過恒河沙性功德故如天台釋天行云即是第一義天天然之理理由行顯因理成行故名理為天行次該攝者但修首楞大定即能該攝萬行天台所謂若巧修止觀即能一心具足萬行矣次積聚者眾生曠劫以來所有善本皆積聚於如來藏中若入深位即得顯現故天台明圓教初住發三種心中緣因開發云眾生無量劫來所有低頭合掌彈指散華發菩提心慈悲誓願勤行六度等一切善根一時開發具足萬行諸波羅密是也今經既云有三摩提具足萬行此則正當第二該攝為義雖是該攝一必具三以依圓理而修大定故曠劫善根因之而發故故天台明三因佛性正因是一性緣了屬二修雖是一性全性起修雖屬二修非適今有言正必具緣了言了必具正緣言緣必具了正舉一即三言三即一不縱不橫是妙三因今之萬行雖是緣因既是妙緣必具三義初本有即正因也次該攝即了因也次積聚即緣因也雖說具三若望理三及以智三今三但是一中之三前之二三望今之三亦各唯是一中之三故前理智及今萬行以三因分之理中雖名三諦但屬正因智中雖名三智但屬了因行中雖具三義但屬緣因是則雖有三三只是一三但三不定三而三三宛然故此三因在中諦中智本有名正因是真性妙境在真諦空智該攝名了因是觀照如智在俗諦假智積聚名緣因是資成圓行此則萬行中本有之義在理為俗諦該攝之義在智為三摩積聚之義在今為萬行而經言有三摩提名大佛頂首楞嚴王具足萬行又甚相當於此義矣今辨此為三初名義全不全二理體具不具三顯發次不次初義者藏通二教雖有菩薩其所莊嚴但是事理兩種六度而百八三昧等萬行尚不聞名何況修習若別教菩薩諸大乘經皆明經劫修行萬行及今圓經題目經文皆總說萬行是則別圓二教萬行名義俱名整足但理體具足及不具足有異耳蓋別人所修空假以非中故尚不云一三相即況云具足萬行既不能一行一切行是故要須經劫一一歷別次第脩習今經既云有三摩提具足萬行此則豈唯一行一切行亦且無煩別修但能得此首楞大定則一切諸三昧皆從禪定生矣言顯發次不次者大品般若明兩種萬行今經純圓唯是一種但萬行名義佛說雖爾次及不次唯證乃知證之之位復有真似似位而證者如南嶽自言一夏親證是也真位而證者如智者明初住緣因善心開發云一切善根登於初住一時顯理一心具足萬行諸波羅蜜乃至即是住大慈大悲十力四無所畏十八不共四無礙智大悲三念六神通四攝法波羅蜜一切三昧陀羅尼等此乃圓教一心具足一時頓證非比別教行向出假位中次第修證之義是為行究竟第五位究竟者修行所歷淺深階級也有人言頓悟即佛無復位次之殊引思益云如此學人不從一地至一地又有師言頓悟初心即究竟圓極而有諸位次者是化鈍根方便立淺深之名耳引楞伽云初地即二地二地即三地寂滅真如有何位次天台云今謂諸說悉是偏取然平等法界尚不論悟與不悟孰辨淺深而今既得論悟與不悟何妨論於淺深究竟大乘無過華嚴大集大品法華雖明法界平等無說無示而菩薩行位終自炳然普賢觀經云大乘因者諸法實相是大乘果者諸法實相是雖俱實相因果歷然若有因果即有淺深不得一向云無位次也今辨此為三初名義圓足不圓足二位次相即不相即三位次超入不超入初義者藏有七賢四果聲聞辟支菩薩佛果共一十五位通有乾慧及辟支菩薩佛果共一十位此是界內巧拙之位比於今經豈唯證殊亦乃名異若纓絡經明五十二位一十信二十住三十行四十向五十地六等覺七妙覺仁王明五十一位五與前同合等妙二覺為一佛地故云三賢十聖住果報唯佛一人居淨土今經五十二位名同纓絡但於十信之前更立乾慧於十向中更開四種加行共五十七位而經云五十五位真菩提路者苕溪所謂乾慧非真妙覺非路也此則三經位次莫不大同但彼兼別多諸委曲非若今經心言直故乃至始終地位無委曲相也二明位次相即不相即為二初正明相即不相即次約六即以判今位初義者天台大師於四教四念處中一一皆辨六即之相故四念處問云大乘生死即涅槃得有理即乃至究竟三藏等亦得作六即判否答欲作亦得如三乘同有偏真之理是理即三藏中習學名字語言是名字即五停心別總念處是觀行即四善根是相似即苦忍真明至九無礙道是分真即三十四心斷煩惱及習氣是究竟即乃至通別圓六即云云問若四教皆有六即則偏圓大小之道胡以區別答三教皆判六即此蓋名同義異之說若以偏圓大小之義而定此名能使纖毫不濫如爾雅訓即者合也若依此訓似如兩物相合名之為即今圓教即名不依此訓但約義解謂即者是也直下便是名之為即是則前之三教皆稱即者正如爾雅所訓兩物相合名之為即非同今之生死煩惱直下便是涅槃菩提也今當更立四句以揀此義庶俾始學不濫教旨一即而不六二六而不即三亦六亦即四非六非即即而不六者凡夫所謂由諸眾生遺此本明雖終日行而不自覺枉入諸趣故六而不即者藏通別三教所謂不知二種根本錯亂修習不能得成無上菩提故亦六亦即者今經五十五位所謂是種種地皆以金剛觀察如幻十種深喻奢摩他中用諸如來毗婆舍那清淨修證故非六非即者如來所謂入妙莊嚴海圓滿菩提歸無所得故次約六即以判今位者此之即義出淨名經大士呵彌勒云佛知一切眾生即涅槃相不可復滅一切眾生即菩提相不可復得故天台約煩惱即菩提生死即涅槃以明六即之義是則能即者煩惱生死所即者菩提涅槃煩惱生死以何義故即是菩提涅槃此義須約十界修性善惡言之方見的旨如本有佛界名為性善本有九界名為性惡緣起佛界名為修善緣起九界名為修惡性之善惡不可異趣同是一切種智性淨涅槃修之善惡既名緣起善惡須分九界修惡名煩惱生死佛界修善名二種修成菩提涅槃即一切智道種智菩提圓淨方便淨涅槃也是則淨名之云即者乃九界修惡當體即是性惡性惡融通無法不趣任運攝得佛界性善以全性起修全修在性如全水為波波還即水故云煩惱即菩提生死即涅槃故天台解淨名經明六即則云生死即涅槃等理即也能如此解與修多羅合名字即也云云至解觀經佛字則云理即佛名字即佛云云解金光明經則云理即金光明云云乃至理即三道三識等十種三法六即云云此即妙宗所謂六即之義不專在佛一切假實三乘人天下至蛣蜣地獄色心皆須六即辨其初後以論十界皆理性故無非法界一不可改故名字去不唯顯佛九亦同彰至於果成十皆究竟然則今經圓位六即於天台諸判必何所屬若依經首示二種根本云一者無始生死根本則汝今者與諸眾生用攀緣心為自性者二者無始菩提涅槃元清淨體則汝今者識精元明能生諸緣緣所遺者又云此見及緣元是菩提妙淨明體又云一切世間諸所有物皆即菩提妙明元心斯則正與淨名生死即涅槃等宛合及乎如來彰自證三諦則遍歷十界而云而如來藏元明心妙即心即空乃至即常樂我淨斯又與妙宗至於果成十皆究竟宛合是故此經六即於智者諸判無斯不在今啚言約義盡唯取如來藏判之蓋一經所明十界迷悟因果曾不外乎如來藏故也明此為六初理即如來藏二名字即如來藏乃至第六究竟即如來藏初理即如來藏者自徵心辨見去訖于四卷發明圓理無非理即如來藏義若就文便以陰入處界本如來藏之文判作理即其義彌顯陰入處界雖三諦中文局六凡義實通乎十界以界外有法性五陰等故如來藏依寶積經則有其三所謂一空如來藏離不解脫一切煩惱二不空如來藏具河沙不思議法三空不空如來藏隨為色空普應一切今經雖單云如來藏而第四卷中則備出三義如云而如來藏本妙元心非心非空等此空如來藏也即如來藏元明心妙即心即空等此不空如來藏也即如來藏妙明心元離即離非是即非即此空不空如來藏也言本如來藏者謂聖凡色心本來圓淨與如來藏平等無差大師所謂此是圓智圓覺諸法遍一切處無不明了雖五無間皆解脫相雖昏盲倒惑其理存焉斯理灼然世間常住無佛不能損有佛不能益得之不為高失之不為下故曰陰入處界本如來藏今更釋其義經言性色真空此陰入處界本空如來藏也性空真色此陰入處界本不空如來藏也清淨本然周遍法界此陰入處界本空不空如來藏也以本代即其義彌顯二名字即如來藏者修德之始聞前理性能詮名也然有收簡收則耳歷法音不問明昧異全不聞俱在此位簡則未得圓聞齊別內凡尚屬理即以七方便未解首楞嚴究竟之名故不知如來藏常住之理經云一切眾生生死相續皆由不知常住真心此之謂也三觀行即如來藏者經云汝今修證佛三摩地於是本因元所亂想立三漸次方得除滅云云三漸次者一者修習除其助因二者真修刳其正性三者增進違其現業此乃名字昇進之位不獨解名又能修觀但未入品非觀行位若此三種修之不已近能伏五住而入乾慧遠能破三惑以登真似故經云因不流逸旋元自歸塵既不緣根無所偶返流全一六用不行云云乃至是人即獲無生法忍然三漸次中除助因刳正性經固明言矣且第三違其現業果以何法而違之乎須知違之之法散在一經括而行之正在乎此夫一經所詮者解行證也解喻如目行喻如足目足相假能到涼池故天台大師釋法華先演十妙為玄義以開圓解次立十乘為止觀以明圓行推此二途目足備矣今倣彼意取一經所詮八法以釋首楞雖曰行之與證亦在其中然於行門修造之法猶未大備故須復採所詮例立十乘以為違現業入地位之本其中名義或與八法多有肖類然彼詳此略意不徒然言十乘者第一觀不思議境第二真正發菩提心第三善巧安心止觀第四破法遍第五識通塞第六道品調適第七對治助開第八知次位第九能安忍第十離順道法愛此十乘法於今經中文義甚備若搆空心立似難取信於人故節節須引成文出之於先然後援經以為證據亦所以彰天台建立名言善符於此經之深旨也第一觀不思議境者止觀大意云境為所觀觀為能觀所觀者何謂陰入處界不出色心色從心造全體是心故經云三界無別法唯是一心作文此經云陰入處界本如來藏妙真如性云云又云此之能造具足諸法若漏無漏非漏非無漏等若因若果非因非果等故經云心佛及眾生是三無差別文此經明如來藏十界俱非俱即俱非破立等皆此義也又云眾生理具諸佛已成成之與具莫不性等謂一一心中一切心一一塵中一切塵一一心中一切塵一一塵中一切心一一心中一切剎一一剎塵亦復然文此經云如來藏中性色真空性空真色清淨本然周徧法界七大之性莫不咸爾前五大塵也後二大心也此是眾生理具一一心中一切塵等下云一中無量無量中一小中現大大中現小一微塵裏轉大法輪於一毛端現寶王剎此是諸佛已成一一心中一切心等迷悟因果同一如來藏性即成之與理莫不性等也又云諸法諸塵諸剎身其體宛然無自性無性本來隨物變所以相入事恒分故我身心塵剎遍諸佛眾生亦復然文此經云汝以生滅之心合如來藏而如來藏隨為色空周遍法界我以不滅不生合如來藏而如來藏惟妙覺明圓照法界會文可知又云一一身土體恒同何妨心佛眾生異異故分終染淨緣緣體本空空不空文此經明三諦中以由異故十界俱即以由同故十界俱非空故故云性色真空不空故云性空真色又云三諦三觀三非三三一一三無所寄諦觀名別體復同是故能所二非二文此經三諦同一如來藏故諦三非三妙奢摩他三摩禪那故觀三非三全如來藏起於三止全三止在於三諦所謂惟妙覺明圓照法界故體同非二也又云如是觀者名觀生死即涅槃煩惱即菩提文此經陰入處界即生死煩惱本如來藏故即涅槃菩提我以妙明不滅不生合如來藏即觀生死即涅槃煩惱即菩提也下去九乘皆用此句以為綱格第二真正發菩提心者起無緣慈悲發四弘誓願也知涅槃即生死此苦可度未度苦者我令度之故誓云眾生無邊誓願度此依苦諦境發知菩提即煩惱此集可解未解集者我令解之故誓云煩惱無數誓願斷此依集諦境發知煩惱即菩提此道易安未安道者我令安之故誓云法門無量誓願學此依道諦境發知生死即涅槃此滅易得未得滅者我令得之故誓云佛道無上誓願成此依滅諦境發如是慈悲無緣無念普覆一切猶如大雲不加功用如磁石吸針是名真正發菩提心文此經當機悟如來藏不思議境已乃說偈讚佛并發誓云願今得果成寶王還度如是恒沙眾又云五濁惡世誓先入如一眾生未成佛終不於此取泥洹成寶王即佛道誓成一願攝得法門誓學必學法門而後得果故還度沙眾即眾生誓度一願攝得煩惱誓斷必斷煩惱方能度生故當機既悟陰入處界本如來藏已而發此願即真正發菩提心也但發此誓位有深淺若肇論云發僧那於始心終大悲於赴難此名字位發心也仁王云十善菩薩發大心長別三界苦輪海此相似位發心也華嚴云初發心時便成正覺此分證位發心也今當機所發位在分真縱非分真亦登相似矣第三善巧安心止觀者初乘名上求次乘名下化乘何等法向上向下所謂善修止觀觀生死即涅槃生死心息秪此心性名大涅槃深禪窟穴即善修止也觀煩惱即菩提煩惱心破只此心性名實相智慧即善修觀也如陰陽調適萬物長成若巧修止觀即能一心具足萬行法華云定慧力莊嚴以此度眾生豈非乘止觀而上求下化乎故名善巧安心止觀文此經正宗之始殷勤啟請一心止觀首楞大定天如云雖以大定為請然如來下文所示別無其方始則決擇真妄次則真妄和融乃至第四卷中皆是發明圓理而已蓋此圓理乃大定之本也圓理即陰入處界本如來藏依此圓理以修大定與觀生死即涅槃等義同而云善修止觀即能一心具足萬行又與此經有三摩提具足萬行宛若符契也第四破法遍者前乘止觀向上向下向上應得果向下應得度今不果不度何物為妨蓋破法有所不遍也又須研生死即涅槃橫破十法界梗塞研煩惱即菩提竪破十法界梗塞本不即十法那忽即十法是故須破本不離十法那忽離十法是故須破不即不離菩提道成譬如轉輪聖王能破一切強敵亦不有所破般若波羅蜜亦復如是能破一切亦不有所破也文此經云我以不滅不生合如來藏而如來藏非心非空等十界豈非不即十法那忽即十法是故須破耶又云而如來藏即心即空等十界豈非不離十法那忽離十法是故須破耶又云而如來藏離即離非是即非即豈非不即不離菩提道成耶若云此是如來果地之事非關因心破法遍者云何合下文若於因地以生滅心為本修因而求佛乘不生不滅之果無有是處之語乎請以理求弗以情閡可也第五識通塞者三觀破法既遍此心應與理會那猶不會當更細檢一切諸法中皆有安樂性那忽併破一切諸法中皆是魔羅網那忽併取須明識通塞若迷生死非涅槃迷煩惱非菩提則十界俱塞若達生死即涅槃達煩惱即菩提則十界俱通故名識通塞文此經云汝以色空相傾相奪於如來藏而如來藏隨為色空周遍法界此由迷生死煩惱即涅槃菩提故以煩惱生死色空相傾相奪致十界俱塞亦是不解一切諸法中皆是魔羅網而皆併取之過也又云我以不滅不生合如來藏而如來藏唯妙覺明圓照法界此即達生死煩惱即涅槃菩提故十界俱通亦是悟一切諸法中皆有安樂性而不併破之功也又十界三諦俱非俱即等皆不併取併破之義又知見立知即無明本即通而塞也知見無見斯即涅槃即塞而通也為物所轉故於是中觀大觀小即通而塞也若能轉物即同如來即塞而通也第六善修道品者行者既識通塞云何於坦途中而修道品當觀身不淨即不淨修於淨非淨非不淨乃至即無常修於常非常非無常此是非榮非枯於其中間入於涅槃乃至種種道品亦復如是涅槃經云從初發心常觀涅槃行道具百句解脫名百觔金煩惱即菩提名為首楞嚴三昧修治於心猶如虗空亦名二十五有王三昧是名善修道品文此經云有三摩提名大佛頂首楞嚴王具足萬行正是觀煩惱即菩提名首楞嚴三昧修治於心等云云之意也第七對治助開者既善修道品必能流入三解脫門若未入而難起方救他而難起云何對治若慳敝難起當觀慳即菩提受不受亦受亦不受乃至五不受不受即檀檀即法界檀義含於六資生無畏法此中一二三餘敝亦如是又對治轉治不轉治等云云是名對治助開文此經先說一心定慧中明四種律儀三學既備餘度在其中矣尚云具足萬行況六度乎又若婬敝宿習難防佛令專誦神呪此又對治之勝法也婬敝難防誦呪既能除滅餘敝輕薄藉神力以銷鎔最為容易是故行者若敝難起時宜好取意用度對治其或守文封意不識變通而飽傷甘露斯則名為欲遐齡而弱喪矣可不慎哉第八善知次位者行人若不識位次則有未得謂得未證謂證增上慢之失當知生死即涅槃理即也能如此解與修多羅合文字涅槃也所觀合文經文合觀觀行涅槃也見思初破六根清淨相似涅槃也無明分破佛性分顯分真涅槃也智齊諸佛斷同大覺究竟涅槃也當自觀察籌量今所得者於六即中屬何位次慎勿撫臆論心欺自欺他是名善知位次文今經所明位次即其事也第九安忍成就者行人行道時熟未熟多動障難每須安忍若知生死即涅槃即不為陰入處界境病患境業相境魔事境禪心境二乘境菩薩境得便若知煩惱即菩提即不為煩惱境諸見境增上慢境得便能忍此無作苦集則生死不能羅煩惱不能染十法界見愛皆為侍者分段變易以為給使是名安忍成就文此經明陰入處界本如來藏即陰入界境十習因六交報并諸天等即業相境色無色界天即禪心境二乘境亦在其中又識陰後二種亦二乘境又攝得菩薩境五十種陰魔通是魔事境煩惱諸見增上慢亦在其中唯病患一境不出大歸一經一論所明諸境雖數有存略要之皆不出生死煩惱如諸見煩惱上慢屬煩惱其餘皆屬生死故天台安忍之法唯云達生死煩惱即涅槃菩提則不為諸境羅染今經則云成就破亂由汝心中五陰主人主人若迷客得其便當處禪那覺悟無咎則彼魔事無奈汝何當處禪那即天台觀生死即涅槃也亦首楞三昧經云知魔界如佛界如一如無二如之謂也第十離法愛者既能修前諸乘又能安於強軟必與法性有所相應於此若生愛著住而不前是為將登而崩將過而墜豈不大失故云涅槃即生死貪著涅槃故生死即涅槃進而不退故是故當觀生死即涅槃生一切禪定三昧種種功德觀煩惱即菩提生諸陀羅尼四無所畏十八不共四無礙智一切種智等佛法若能如是是名順愛不生而生般若故云離法愛文此經云眾生狂迷不自忖量逢此現前各以所愛先習迷心而自休息將為畢竟所歸寧地自言滿足無上菩提聲聞緣覺不成增進汝等存心秉如來道將此法門於我滅後傳示末世普令眾生覺了斯義令其身心入佛知見從始至終不遭邪岐乃至入妙莊嚴海圓滿菩提歸無所得是為離順道法愛也大師云此十重法橫竪收束微妙精巧初則簡境真偽中則正助相添後則安忍無著意圓法巧該括周備規矩初心將送行者至彼薩雲非闇證禪師文字法師所能知也譬如毗首羯磨造得勝堂不疎不密間隙容綖巍巍昂昂峙於上天非拙匠所能揆則又如善畫圖其匡廓寫像偪真骨法精巧生氣飛動豈填彩人所能點綴云云若欲周知當啟摩訶止觀知彼則知此知此經然後以知如來及智者矣此法修之始於名字成之登於觀行觀行即五品也此經名乾慧地經云執心虗明純是智慧慧性明圓鎣十方界乾有其慧名乾慧地蓋以不思議觀觀不思議境達陰入處界本如來藏人法二執了無實性故云執心虗明純是智慧而如來藏惟妙覺明圓照法界故云慧性明圓鎣十方界此皆圓伏五住觀行即如來藏初成之相所謂欲愛初乾未與如來法流水接也第三相似即如來藏者十信位也言相似者觀空如來藏得相似相應觀不空如來藏得相似相應觀空不空如來藏得相似相應天台云相似者二物相類如鍮似金若瓜比匏猶火先煖涉海初平水性至冷飲者乃知渴不掘井聽說何為略舉其要如法華六根清淨即是其相其位有十一信心二念心乃至第十願心天台於法華圓位十信以十乘對纓絡經別住十心云以修平等法界即入信心善修慈愍即入念心乃至善修無著即入願心此約竪對故以一乘對一信若橫論者一一信中皆具十乘故纓絡經云一信有十十信有百百法為一切法之根本也荊溪云一一信中言善修者由緣實相行於五悔䇿勤精進至第五品得入十信名為善修由善修故相似解起是故十法在相似位轉名信心乃至願心亦復如是何者不思議境以信為本慈悲弘誓藉念力持心安止觀功由精進破於三惑由決定力於通無塞方稱妙慧元修道品為求不退正助無闕回因向果不濫位次方能護法內外不動由善防非於法無愛由大願力故得至此名為信心乃至願心十法既許初心具修當知信信皆具十法是則十信有百明矣普賢觀經無生忍前有十境界即此位也入此十信能破界內見思又破界外塵沙及伏無明住地之惑初信云一切妄想滅盡無餘此之謂也第五分真即如來藏者亦名分證即分破無明分證真理也除四加行共四十一位謂十住十行十回向十地等覺此四十一位既俱稱分真是則位位具諸位功德分分皆真也大品明四十二字語等字等若聞阿字門則解一切義所謂諸法初不生故乃至第四十二荼字入諸邊境不終不生過茶無字可說一一字皆入四十二字四十二字皆入一字南嶽師云何必不表四十二位以圓初住獲無生忍與阿字初不生義同妙覺終窮究竟與荼字不終不生義同位位具諸位功德與一字入多字多字入一字義同故華嚴云從初地具足諸地功德今準此義但略解初發心住所證功德以明分真之義諸位功德例此可知初發心住者仁王云入理般若名之為住所謂以不住法住祕藏中天台釋此大略有二一明入住之因二明發心之相入住之因者如妙玄云以從相似十信能入十住真中智也發心之相者初發心時有三種心發一緣因善心發即是住不思議解脫首楞嚴定二了因慧心發即是住摩訶般若畢竟之空三正因理心發即是住實相法身中道第一義舉要言之即是住三德一切佛法又住清淨圓滿菩提心無緣慈悲無作誓願普覆法界又住一念中成就一切萬行諸波羅蜜又住一切種智圓斷法界見思無明又住得佛眼圓見十法界三諦之法又住圓入一切法門所謂二十五有三昧冥益眾生又住菩薩圓滿業能顯一切神通謂三輪不思議化彌滿法界顯益眾生又能成就開權顯實入一乘道又能嚴淨一切佛土能起三業供養一切十方佛得圓滿陀羅尼受持一切佛法如雲持雨又住能從一地具足諸地功德心心寂滅自然流入薩婆若海荊溪云證不思議名住一切佛法證三種菩提名住慈悲普覆證寂照止觀名住一心三智證破三惑名住一切種智證於通無塞名住佛眼圓見證無作道品名住法身冥益證助道萬行名住神通顯益證圓門實位名住開顯二乘證安忍內外名住嚴淨佛土證無諸法愛名住諸地功德此初住證轉似為真也此經云是善男子以真方便發此十心心精發輝十用涉入圓成一心名發心住十心前之十信心也言以真方便發此十心者正天台明十住之因以從相似十信能入真中智也心精發輝十用涉入圓成一心者正天台明發心之相轉似為真發十種德也然此初住文猶總略若一一顯示其相當如觀音所敘經云生滅滅已寂滅現前即是住三德一切佛法經云十方圓明獲二殊勝一者上合十方諸佛本妙覺心與佛如來同一慈力二者下合十方一切六道眾生同一悲仰即是住清淨圓滿菩提心無緣慈悲無作誓願普覆法界亦是住得佛眼圓見十法界三諦之法經云忽然超越世出世間即是住一切種智圓斷法界見思無明經云與佛同慈力故令我身成三十二應入國土身即是住菩薩圓滿業能顯一切神通三輪不思議化彌滿法界顯益眾生經云與眾生同悲力故令諸眾生於我身心獲十四無畏功德即是住圓入一切法門二十五有三昧冥益眾生經云不動道場涉入世間不壞世界能遍十方供養微塵諸佛如來又云六根圓明明照無二含十方界立大圓鏡空如來藏承順十方如來祕密法門受領無失即是住能嚴淨一切佛土能起三業供養如來得圓滿陀羅尼受持一切佛法如雲持雨經云若諸菩薩入三摩地進修無漏勝解現圓我現佛身而為說法令其解脫即是能成就開權顯實入一乘道總前功德即是能從一地具足諸地功德心心寂滅自然流入薩婆若海亦是住一念中成就一切萬行諸波羅密但觀音所證不局初住然亦不妨以初住解釋初住既爾下去三觀現前無功用心斷法界無量品無明所有功德不可稱計大分略為十品智斷明十住位也如經次十行者即於佛性第一義諦無漏真明一心具一切行念念進趣流入平等法界破十品無明成十品智斷一切諸行波羅蜜不可思議增長出生自行化他功德與虗空等故名十行如經三十回向者無功用不思議無漏真明念念開發增長一切法界願行事理和融心心寂滅自然回入平等法界薩婆若海又進破十品無明證十品智斷故名十回向如經四十地者無漏真明入無功用道猶如大地能生一切佛法能荷負法界眾生普入三世佛地廣大如法界究竟如虗空又進破十品無明成就十品智斷約此以明十地也如經五等覺者觀達無始無明源底邊際智滿畢竟清淨斷最後窮源微細無明登中道出頂與無明父母別是名有所斷者名有上士如經此上四十一位同名分真即如來藏也第六究竟即如來藏者第四十二妙覺位究竟解脫無上佛智故言無所斷者名無上士此即三德不縱不橫究竟後心大涅槃也一切大理大誓願大莊嚴大智斷大徧知大道大用大權實大利益大無住大即是前十觀成乘圓極竟在於佛過茶無字可說故盧舍那佛名為淨滿一切皆滿也荊溪云妙覺位中名大涅槃十法至此俱名為大是故文云御車達到猶名為車自爾已前雖具諸法未究竟顯不名為大雖有慈悲為無明隔故不名大雖常寂照所嚴未窮能嚴非大雖破三惑智未周窮故智非大雖知通塞塞仍未盡故知非大雖得道品道未至極故道非大雖用正助正行未滿故用非大雖復開權理未窮終故開非大雖忍二邊猶有餘惑故益非大雖不著位位未至極故位非大是故妙覺十皆名大名究竟乘今經首題稱為大佛蓋此謂也是名究竟即如來藏三位次超入不超入者此六即所判之位一往約鈍根位不躐等故作此五十七翻修證智斷若利根捷智自有一生超入十地等覺後心者亦未必定拘此限故經云如是乃超十信十住十行十回向四加行菩薩所行金剛十地等覺圓明入於如來妙莊嚴海圓滿菩提歸無所得又前之三教教教俱有超不超之異以分利鈍但偏小與今為異耳是名位究竟
